# Sync docs/wiki/ to the repo's GitHub wiki on push to main.
#
# Dual-source design (Phase 2 plan §Deliverable 2): docs/wiki/ in this
# repo is the SOURCE OF TRUTH for the wiki. The GitHub wiki at
# https://github.com/Polycentric-Labs/evidentia/wiki is auto-generated
# downstream by this workflow on every push that touches docs/wiki/**.
# Wiki edits go through normal PR review against docs/wiki/; direct
# wiki edits are restricted to collaborators via Settings -> Features.
#
# Triggered when any file under docs/wiki/ changes on main (plus the
# sync + mirror scripts + this workflow itself, so config-only updates
# re-fire). Authenticated via the workflow's GITHUB_TOKEN. The token's
# contents: write scope authorizes the push to <repo>.wiki.git
# (same-repo wiki push uses the same token, no PAT needed).
#
# Before the wiki push, three generators regenerate the auto-generated wiki
# pages from their canonical sources so the wiki always pushes content that
# matches HEAD:
#   - scripts/wiki/sync_mirrors.py     -> the 13 mirror pages
#                                         (docs/wiki/{6-project,5-compliance}/*)
#                                         from repo-root / docs/ canonical docs.
#                                         Stdlib-only -> runs under bare python.
#   - scripts/wiki/sync_reference.py   -> the 5 reference pages
#                                         (docs/wiki/4-reference/{cli,mcp-tools,
#                                         configuration,catalogs,crosswalks}.md)
#                                         from the live code/data. The cli page
#                                         imports the Typer app, so this runs
#                                         under `uv run` with the project synced.
#   - scripts/wiki/sync_api_docs.py    -> the 7 per-package API pages
#                                         (docs/wiki/4-reference/api/*.md) from
#                                         each package's public surface. Also
#                                         `uv run` (it reads pyproject + source).
#
# First-run prerequisite: Wiki feature must be enabled in
# Settings -> Features -> Wikis. The sync script gracefully fails
# (exit 1) with a helpful message if the wiki repo cannot be cloned.
#
# SHA pinning per the v0.10.6 C7 pattern; same SHAs as
# verify-changelog.yml for consistency.

name: sync-wiki

on:
  push:
    branches: [main]
    paths:
      - "docs/wiki/**"
      - "scripts/sync_wiki_to_github.py"
      - "scripts/wiki/sync_mirrors.py"
      - "scripts/wiki/sync_reference.py"
      - "scripts/wiki/sync_api_docs.py"
      - ".github/workflows/sync-wiki.yml"
  workflow_dispatch:

# Top-level defaults: read-only. The push to <repo>.wiki.git needs
# contents:write — scoped to the `sync` job only per Scorecard
# TokenPermissionsID alert #124 (v0.10.6 → v0.10.7 hygiene).
permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # JUSTIFIED: push to <repo>.wiki.git uses the same-repo GITHUB_TOKEN.
    # Scoped at job level (vs top-level) so the workflow's read-only
    # default applies to any future jobs that don't need write access.
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"

      # Regenerate the auto-generated mirror pages from canonical sources
      # so the wiki push below always reflects canonical HEAD. Stdlib-only
      # script -> runs under the bare python above (no uv needed).
      - name: Refresh wiki mirror pages
        run: python scripts/wiki/sync_mirrors.py

      # The reference + API-docs generators need the project importable
      # (sync_reference.py introspects the Typer app; both read package
      # source/pyproject), so install via uv before running them.
      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Install workspace
        run: uv sync --all-packages

      # Regenerate the 5 reference pages (cli / mcp-tools / configuration /
      # catalogs / crosswalks) from the live code/data.
      - name: Refresh wiki reference pages
        run: uv run python scripts/wiki/sync_reference.py

      # Regenerate the 7 per-package API pages from each package's public
      # surface.
      - name: Refresh wiki API pages
        run: uv run python scripts/wiki/sync_api_docs.py

      - name: Run wiki sync
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
        run: python scripts/sync_wiki_to_github.py
