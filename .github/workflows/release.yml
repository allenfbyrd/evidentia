name: release

on:
  push:
    tags:
      - "v*"

# Workflow-level least-privilege default. The publish-pypi job below
# elevates to `contents: write` (Release attachment) +
# `id-token: write` (PyPI OIDC) + `attestations: write` (SLSA L3)
# locally. Closes OpenSSF Scorecard alert #30 (no top-level
# permission defined) — top-level read-only narrows the blast
# radius if any third-party action is compromised in a future job
# we add to this workflow.
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish-pypi:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/evidentia/
    permissions:
      # v0.7.0: contents: write so the CycloneDX SBOM can be attached
      # to the GitHub Release via softprops/action-gh-release.
      contents: write
      # v0.7.0: id-token: write enables PyPI Trusted Publisher OIDC
      # token exchange. The pypa/gh-action-pypi-publish action mints a
      # short-lived (~15 min) PyPI API token bound to this exact repo +
      # workflow file + environment, and uses it for the upload. The
      # legacy long-lived PYPI_API_TOKEN is no longer used. This also
      # auto-enables PEP 740 attestations: every wheel + sdist is
      # Sigstore-signed with our OIDC identity and logged to Rekor,
      # with the attestation uploaded to PyPI alongside the file.
      # v0.7.3: same id-token: write also covers
      # actions/attest-build-provenance for the SLSA L3 build
      # provenance attestation step below.
      id-token: write
      # v0.7.3 (S3): attestations: write lets
      # actions/attest-build-provenance store the SLSA build provenance
      # under repos/<org>/<repo>/attestations so that
      # `gh attestation verify` can resolve it for any artifact in this
      # release. Closes the H2 enterprise-grade item ("SLSA L2+
      # reproducible builds + SBOM") and restores `gh attestation
      # verify dist/<wheel>` as a working verifier alongside
      # `pypi-attestations verify pypi` (the PEP 740 verifier path).
      attestations: write

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Install uv
        uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39  # v3.2.4
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      # v0.4.0: the evidentia-api package bundles the React SPA built
      # from packages/evidentia-ui. The hatchling build hook
      # (packages/evidentia-api/hatch_build.py) drives `npm run build`
      # automatically during `uv build`; this step just provisions Node.
      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: packages/evidentia-ui/package-lock.json

      - name: Sync workspace
        run: uv sync --all-packages

      - name: Build all workspace packages
        # uv build triggers the hatchling frontend-bundle hook for
        # evidentia-api, which runs npm ci + npm run build in the UI
        # directory and copies dist/* into src/evidentia_api/static/.
        run: uv build --all-packages

      - name: Check distributions
        run: |
          ls -la dist/
          uvx twine check dist/*

      # Verify the evidentia-api wheel actually contains the SPA bundle
      # before we publish. Catches build-hook failures that would otherwise
      # ship an empty web UI to users.
      - name: Verify SPA is bundled
        run: |
          python -c "
          import zipfile, glob, sys
          wheels = [p for p in glob.glob('dist/evidentia_api-*.whl')]
          if not wheels:
              sys.exit('No evidentia-api wheel produced')
          with zipfile.ZipFile(wheels[0]) as z:
              names = z.namelist()
          spa_files = [n for n in names if n.startswith('evidentia_api/static/') and n.endswith('.html')]
          assert spa_files, f'No SPA HTML in wheel: {names[:20]}'
          print(f'SPA bundled OK: {spa_files}')
          "

      # v0.7.0: CycloneDX SBOM generation for supply-chain transparency.
      # Addresses enterprise-grade checklist item H2 (SBOM on every
      # release). cyclonedx-bom pins versions from the uv.lock so the
      # SBOM matches the actually-published wheels.
      - name: Generate CycloneDX SBOM
        # SBOM is written to repo root, NOT dist/, because pypa/gh-action-pypi-publish
        # globs the entire packages-dir directory and rejects non-wheel/sdist files
        # with `InvalidDistribution: Unknown distribution format`. The
        # softprops/action-gh-release step below picks it up by explicit path.
        #
        # cyclonedx-py environment CLI surface (cyclonedx-bom 6.x):
        #   -o <file>            output path (NOT --outfile)
        #   --of <format>        output format (or --output-format)
        #   --sv <version>       spec version (NOT --schema-version)
        #   --pyproject <file>   root component pyproject.toml
        #   <python>             positional: path to Python INTERPRETER
        #                        (sys.executable, NOT sys.prefix/.venv dir)
        run: |
          uvx --from cyclonedx-bom cyclonedx-py environment \
            -o evidentia-sbom.cdx.json \
            --of JSON \
            --sv 1.6 \
            --pyproject packages/evidentia-core/pyproject.toml \
            "$(uv run python -c 'import sys; print(sys.executable)')"
          echo "SBOM generated:"
          ls -la evidentia-sbom.cdx.json
          python -c "
          import json
          with open('evidentia-sbom.cdx.json') as f:
              sbom = json.load(f)
          print(f\"bomFormat: {sbom.get('bomFormat')}\")
          print(f\"specVersion: {sbom.get('specVersion')}\")
          print(f\"components: {len(sbom.get('components', []))}\")
          "

      # v0.7.3 (S3): SLSA L3 build provenance attestation. Generated
      # AFTER both `uv build` (the wheels + sdists in dist/) and the
      # CycloneDX SBOM step so a single attestation covers all release
      # artifacts. Stored under
      # https://github.com/allenfbyrd/evidentia/attestations and
      # verified by consumers via:
      #   gh attestation verify dist/<wheel> -R allenfbyrd/evidentia
      # This is the SLSA path; the PEP 740 path
      # (`pypi-attestations verify pypi`) continues to work
      # independently via pypa/gh-action-pypi-publish below.
      - name: Generate SLSA build provenance attestation
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be  # v2.4.0
        with:
          # Subject globs cover both the published artifacts and the
          # SBOM that travels with the GitHub Release. Newline-
          # separated per the action's input contract.
          subject-path: |
            dist/*.whl
            dist/*.tar.gz
            evidentia-sbom.cdx.json

      - name: Publish to PyPI via Trusted Publisher (OIDC)
        # v0.7.0: migrated from long-lived PYPI_API_TOKEN to PyPI
        # Trusted Publisher (OIDC). Per-package configuration on PyPI:
        # https://pypi.org/manage/project/<name>/settings/publishing/
        # All 6 packages (evidentia, evidentia-core, evidentia-collectors,
        # evidentia-ai, evidentia-api, evidentia-integrations) must be
        # registered with the same claims:
        #   Owner=allenfbyrd, Repository=evidentia,
        #   Workflow=release.yml, Environment=pypi
        # `attestations: true` is the action's default since v1.11+
        # (Nov 2024) when Trusted Publisher mode is detected, so PEP 740
        # Sigstore attestations are produced automatically.
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # release/v1
        with:
          packages-dir: dist/
          # skip-existing: true so re-runs after partial publishes
          # don't choke on already-uploaded wheels (PyPI rejects
          # re-uploads of the same version). With this flag, twine
          # gracefully skips files PyPI already has and continues
          # with the rest. Auth/OIDC errors still fail loud.
          skip-existing: true
          verbose: true

      # Attach the SBOM to the GitHub Release alongside the wheels so
      # consumers can validate their install against the shipped SBOM.
      - name: Attach SBOM to GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65  # v2.6.2
        with:
          files: evidentia-sbom.cdx.json
          fail_on_unmatched_files: false

  # v0.7.5 (C1-C3): Container image publish to ghcr.io with cosign keyless
  # OIDC signing + SLSA L3 build provenance attestation for the image
  # digest. Mirrors the publish-pypi pattern above so a single release
  # workflow run covers wheels + SBOM + image under one OIDC identity
  # binding (allenfbyrd/evidentia/release.yml@refs/tags/v*) and one
  # GitHub Release.
  #
  # Design choice (Option A): the v0.7.5-plan.md C1 row originally
  # described this as a separate `release-container.yml` workflow.
  # During Phase 4 design we picked the in-`release.yml` job approach
  # instead — needs: publish-pypi gives deterministic ordering for free,
  # avoids `workflow_run` trigger flakiness, and keeps the wheel + image
  # attestations under one GH Actions run id for clean audit narrative.
  # See `docs/v0.7.5-plan.md` C1 + this commit message for full rationale.
  publish-container:
    name: Build and publish container image to ghcr.io
    needs: publish-pypi
    runs-on: ubuntu-latest
    environment:
      name: ghcr
      url: https://ghcr.io/allenfbyrd/evidentia
    permissions:
      # contents: write — append the image digest + verify-cmd snippet to
      #   the GitHub Release alongside the wheels + SBOM.
      contents: write
      # id-token: write — Fulcio OIDC for cosign keyless signing AND
      #   token exchange for actions/attest-build-provenance.
      id-token: write
      # attestations: write — store the SLSA build-provenance attestation
      #   under repos/allenfbyrd/evidentia/attestations so consumers can
      #   verify via `gh attestation verify oci://ghcr.io/...`.
      attestations: write
      # packages: write — push to ghcr.io under the github.repository_owner
      #   namespace.
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3.12.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@184bdaa0721073962dff0199f1fb9940f07167d1  # v3.5.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        # Tag is v0.7.5; we want both v0.7.5 (the tag) and 0.7.5 (the
        # bare semver) for OCI label consumption + GitHub Release notes.
        run: |
          REF="${{ github.ref_name }}"
          echo "tag=${REF}" >> "$GITHUB_OUTPUT"
          echo "semver=${REF#v}" >> "$GITHUB_OUTPUT"

      # v0.7.6 — pre-emptive PyPI propagation wait. v0.7.5 ship hit
      # this race: even with `needs: publish-pypi` ordering, the
      # PyPI Fastly CDN hadn't propagated the new wheel by the time
      # the docker build's `pip install evidentia[gui]==<version>`
      # ran (~50% failure rate observed on first-tag-push of v0.7.5).
      # The previous design assumed propagation would be < buildx
      # warm-up time; in practice it isn't. Loop polls `pip index
      # versions` until the new version appears, capped at 5 minutes.
      - name: Wait for PyPI propagation
        env:
          VERSION: ${{ steps.version.outputs.semver }}
        run: |
          echo "Waiting for evidentia==${VERSION} to appear on PyPI..."
          attempts=0
          max_attempts=30  # 30 * 10s = 5 min cap
          until pip index versions evidentia 2>&1 | grep -q "${VERSION}"; do
            attempts=$((attempts + 1))
            if [ "${attempts}" -ge "${max_attempts}" ]; then
              echo "ERROR: PyPI propagation timed out after 5 min."
              echo "Latest visible:"
              pip index versions evidentia 2>&1 | head -3
              exit 1
            fi
            echo "  attempt ${attempts}/${max_attempts}: not yet propagated, sleeping 10s"
            sleep 10
          done
          # Extra safety margin for Fastly mirror lag — even after the
          # index page lists the version, individual mirror nodes can
          # lag by 10-20s before the wheel file itself is fetchable.
          echo "Index lists ${VERSION}; sleeping 20s for mirror catch-up"
          sleep 20

      - name: Build and push image to ghcr.io
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8  # v6.19.2
        with:
          context: .
          push: true
          # Both v<X.Y.Z> and :latest get pushed to the same digest.
          # cosign signs by digest (not tag), so one signing call covers
          # both tags. Keeping :latest as the rolling pointer matches
          # Docker conventions and is the tag the Dockerfile-pin
          # documentation recommends NOT using in production deployments
          # (see docs/sigstore-quickstart.md "Pinning by digest" section).
          tags: |
            ghcr.io/allenfbyrd/evidentia:${{ steps.version.outputs.tag }}
            ghcr.io/allenfbyrd/evidentia:latest
          labels: |
            org.opencontainers.image.version=${{ steps.version.outputs.semver }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
          # CRITICAL: provenance: false because actions/attest-build-provenance
          # below produces the SLSA-spec provenance separately. Leaving
          # buildx's default provenance ON would emit a second, non-SLSA-
          # spec provenance attestation that confuses
          # `gh attestation verify oci://...`. Same for sbom: false —
          # the project's CycloneDX SBOM is generated by publish-pypi
          # for the wheel + sdist surface; image-level SBOM is a
          # future enhancement.
          provenance: false
          sbom: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install cosign
        uses: sigstore/cosign-installer@7e8b541eb2e61bf99390e1afd4be13a184e9ebc5  # v3.10.1
        with:
          # Pin both action SHA AND cosign-release version. Scorecard's
          # Pinned-Dependencies will flag a floating cosign-release
          # otherwise (would also break reproducibility — release-time
          # cosign behavior should be byte-stable).
          cosign-release: 'v2.4.1'

      - name: Sign image with cosign (keyless OIDC)
        env:
          # COSIGN_YES non-interactive mode. v2.x defaults to keyless;
          # the env var here is an explicit-intent marker for code review.
          COSIGN_YES: "true"
        run: |
          # Sign by digest (NOT tag) — guarantees the signature binds
          # to the immutable image bytes, immune to tag re-targeting
          # mid-release. cosign appends the signature as a sibling tag
          # at sha256-<digest>.sig, so v0.7.5 and :latest both inherit
          # the same signature via their shared digest.
          cosign sign --yes \
            ghcr.io/allenfbyrd/evidentia@${{ steps.build.outputs.digest }}

      - name: Generate SLSA build provenance attestation for image
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be  # v2.4.0
        with:
          # subject-name MUST be the registry-qualified image without a
          # tag; subject-digest is the sha256 from the build step. The
          # attestation lands at repos/allenfbyrd/evidentia/attestations
          # keyed on this digest, which `gh attestation verify oci://...`
          # then resolves on the consumer side.
          subject-name: ghcr.io/allenfbyrd/evidentia
          subject-digest: ${{ steps.build.outputs.digest }}
          # push-to-registry: true also embeds the attestation as an
          # OCI referrer artifact so cosign tooling can find it without
          # querying GitHub. Belt-and-suspenders for offline verification.
          push-to-registry: true

      - name: Append container image section to GitHub Release
        # Uses append_body so this lands AFTER softprops/action-gh-release
        # in publish-pypi created the release (with SBOM attached). The
        # publish-pypi job creates the release; this job appends to it.
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65  # v2.6.2
        with:
          append_body: true
          body: |

            ### Container image

            - `ghcr.io/allenfbyrd/evidentia:${{ steps.version.outputs.tag }}`
            - `ghcr.io/allenfbyrd/evidentia:latest`
            - Digest: `${{ steps.build.outputs.digest }}`

            **Verify (cosign keyless OIDC):**

            ```bash
            cosign verify ghcr.io/allenfbyrd/evidentia:${{ steps.version.outputs.tag }} \
              --certificate-identity-regexp 'https://github\.com/allenfbyrd/evidentia/\.github/workflows/release\.yml@refs/tags/v.*' \
              --certificate-oidc-issuer 'https://token.actions.githubusercontent.com'
            ```

            **Verify (SLSA build provenance):**

            ```bash
            gh attestation verify oci://ghcr.io/allenfbyrd/evidentia:${{ steps.version.outputs.tag }} \
              -R allenfbyrd/evidentia
            ```

            See [docs/sigstore-quickstart.md](https://github.com/allenfbyrd/evidentia/blob/main/docs/sigstore-quickstart.md)
            for the full verification narrative.
