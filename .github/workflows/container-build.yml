# Container image build smoke test (v0.7.3 P2 B2 lightweight).
#
# Builds the repo-root `Dockerfile` on every PR that touches it +
# every push to main. Validates that the image builds end-to-end
# and that the in-image `evidentia version` + `evidentia
# catalog list` invocations succeed against the latest published
# evidentia wheel from PyPI.
#
# This workflow does NOT publish the built image — publishing to
# `ghcr.io/polycentric-labs/evidentia` is gated to a future release that
# explicitly opts in (likely v0.7.4 with cosign signing wired in).
# Runs in PR context so any breaking change to the Dockerfile or
# to the published evidentia wheel surfaces here, not at consumer-
# pull time.

name: Container build smoke test

on:
  pull_request:
    paths:
      - 'Dockerfile'
      - '.github/workflows/container-build.yml'
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - '.github/workflows/container-build.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build + smoke test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4.0.0

      # v0.7.9 — PyPI propagation wait (mirrors release.yml's
      # publish-container Wait-for-PyPI step added in v0.7.6).
      #
      # WHY THIS EXISTS: the container build pins
      # `evidentia[gui]==X.Y.Z` to the exact current release. When
      # the version-bump commit (`chore(release): bump to X.Y.Z`)
      # lands on main as part of a multi-commit push, the smoke
      # test fires before X.Y.Z has been published to PyPI (publish
      # only happens when the matching `vX.Y.Z` tag is pushed,
      # triggering release.yml). The pre-v0.7.9 design tried to
      # avoid this with `if: !startsWith(github.event.head_commit.message, 'chore(release):')`
      # — but that only checks the head commit. In a 21-commit push
      # where the bump is the 5th commit and 16 docs/refactor commits
      # follow it (the v0.7.8 ship pattern), the head IS NOT the bump,
      # the guard misses, and the build hits "No matching distribution
      # found for evidentia==X.Y.Z" 1.3 seconds in.
      #
      # THE FIX: parse the version pin + poll PyPI until that exact
      # version is fetchable, capped at 5 min. Same mechanism as
      # release.yml/publish-container (v0.7.6 CI1) so one mental
      # model covers both workflows.
      #
      # v0.8.4 G4 Path 2: with the Dockerfile now using
      # `pip install --require-hashes -r /tmp/requirements.txt`,
      # the version pin lives in `docker/requirements.txt` (which
      # release.yml regenerates ephemerally against PyPI's just-
      # published wheels at tag time). Pre-tag pushes carry the
      # PREVIOUS release's pin (e.g. v0.8.4 cycle pre-tag push
      # carries v0.8.3 hashes). The smoke test validates the
      # build process works against the previous release on every
      # main push; the actual v0.8.4-pinned image is built at tag
      # time by release.yml (which regenerates requirements.txt
      # first against PyPI's just-published v0.8.4 wheels).
      #
      # FAILURE MODE: if the wait times out, the most likely cause
      # is that the smoke test is running for a release that hasn't
      # actually been published to PyPI yet. The error message
      # below makes that explicit.
      - name: Extract version pin (v0.8.4 — from docker/requirements.txt)
        id: pin
        run: |
          # v0.8.4 G4 Path 2: read pin from docker/requirements.txt
          # (committed preview state) instead of Dockerfile (which
          # now uses --require-hashes).
          # Match `evidentia[gui]==X.Y.Z` or `==X.Y.Z.N` (4-digit
          # version support added in v0.7.7.1 bump_version.py).
          # Using `sed -nE` (extended regex, portable across GNU + BSD)
          # rather than `grep -oP` (PCRE) to avoid locale unibyte
          # warnings on minimal runners.
          VERSION=$(sed -nE 's/.*evidentia\[gui\]==([0-9]+\.[0-9]+\.[0-9]+(\.[0-9]+)?).*/\1/p' docker/requirements.txt | head -n1)
          if [ -z "${VERSION}" ]; then
            echo "ERROR: could not parse pinned evidentia version from docker/requirements.txt."
            echo "Expected pattern: evidentia[gui]==X.Y.Z \\"
            grep -n 'evidentia\[gui\]' docker/requirements.txt || true
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "docker/requirements.txt pins evidentia[gui]==${VERSION}"

      - name: Wait for PyPI propagation
        env:
          VERSION: ${{ steps.pin.outputs.version }}
        run: |
          # v0.7.14 P2.2: extend the wait to ALL 6 inter-package
          # deps, not just the umbrella. The v0.7.13 e32b742 smoke
          # test failure proved this gap: pip resolved
          # evidentia==0.7.13 then failed on
          # evidentia-core<0.8.0,>=0.7.13 because evidentia-core
          # hadn't propagated yet. Polling all 6 packages prevents
          # this race entirely (the v0.7.13 P0.5 pin-trap fix
          # ensures the inter-package pins are tightened, so any
          # of the 6 not-yet-propagated would block the install).
          PACKAGES="evidentia evidentia-core evidentia-ai evidentia-collectors evidentia-integrations evidentia-api"
          for pkg in $PACKAGES; do
            echo "Waiting for ${pkg}==${VERSION} to appear on PyPI..."
            attempts=0
            max_attempts=30  # 30 * 10s = 5 min cap per package
            until pip index versions "${pkg}" 2>&1 | grep -q "${VERSION}"; do
              attempts=$((attempts + 1))
              if [ "${attempts}" -ge "${max_attempts}" ]; then
                echo ""
                echo "::error::PyPI propagation timed out after 5 min waiting for ${pkg}==${VERSION}."
                echo ""
                echo "Most likely cause: the version-bump commit was pushed without"
                echo "the matching v${VERSION} tag, so release.yml never fired and"
                echo "${pkg}==${VERSION} was never published to PyPI."
                echo ""
                echo "Recovery:"
                echo "  git tag v${VERSION}"
                echo "  git push origin v${VERSION}"
                echo "  # then re-run this workflow via workflow_dispatch"
                echo ""
                echo "Latest visible on PyPI:"
                pip index versions "${pkg}" 2>&1 | head -3
                exit 1
              fi
              echo "  ${pkg} attempt ${attempts}/${max_attempts}: not yet propagated, sleeping 10s"
              sleep 10
            done
            echo "  ${pkg}==${VERSION} visible on PyPI"
          done
          # Extra safety margin for Fastly mirror lag — even after
          # every index page lists the version, individual mirror
          # nodes can lag by 10-20s before the wheel files themselves
          # are fetchable. This single 20s wait is sufficient for the
          # mirror catch-up across all 6 packages (mirror lag is per
          # CDN node, not per package).
          echo "All 6 packages list ${VERSION}; sleeping 20s for mirror catch-up"
          sleep 20

      # v0.8.4 G4 Path 2: regenerate docker/requirements.txt against
      # PyPI's just-confirmed-propagated wheels BEFORE the docker
      # build. Mirrors release.yml's publish-container regeneration
      # step. The committed docker/requirements.txt is preview
      # state — release.yml AND this smoke test both overwrite it
      # ephemerally so hashes match the bytes actually being
      # downloaded by the container build's `pip install
      # --require-hashes` step. Without this, the committed file's
      # hashes (which may be from a Windows local pip-compile run
      # whose `uv build` produced different bytes than the
      # PyPI-uploaded Linux-CI build) wouldn't match what pip
      # downloads, breaking the install.
      - name: Regenerate hash-pinned requirements.txt against PyPI
        env:
          VERSION: ${{ steps.pin.outputs.version }}
        run: |
          echo "evidentia[gui]==${VERSION}" > docker/requirements.in
          pip install -q pip-tools==7.5.3  # PinnedDependencies (Scorecard)
          attempts=0
          max_attempts=3
          until pip-compile --generate-hashes \
                            --no-emit-find-links \
                            --output-file=docker/requirements.txt \
                            docker/requirements.in
          do
            attempts=$((attempts + 1))
            if [ "${attempts}" -ge "${max_attempts}" ]; then
              echo "::error::pip-compile against PyPI failed after ${max_attempts} attempts"
              exit 1
            fi
            echo "  pip-compile attempt ${attempts}/${max_attempts} failed, sleeping 30s"
            sleep 30
          done
          echo "Regenerated docker/requirements.txt; evidentia[gui]==${VERSION} hashes:"
          grep -A2 "^evidentia\[gui\]==" docker/requirements.txt | head -4

      - name: Build image (load into local Docker, not pushed)
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7.1.0
        with:
          context: .
          push: false
          load: true
          tags: evidentia:smoke
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test — `evidentia version`
        run: |
          # `evidentia version` is a subcommand (not a `--version` flag).
          # The Typer-driven CLI registers `version` alongside `init`,
          # `doctor`, `serve`, `gap`, `catalog`, `risk`, etc. Using
          # `--version` errors with "No such option: --version".
          docker run --rm evidentia:smoke version

      - name: Smoke test — `evidentia catalog list`
        run: |
          # Validate the bundled catalog set ships in the image.
          # `catalog` is the canonical subcommand (not `frameworks`).
          # Pipe to head to limit log noise; we just need to see at
          # least one framework row to know the catalog data made it
          # through the install.
          docker run --rm evidentia:smoke catalog list | head -10

      - name: Smoke test — image labels
        run: |
          # Validate the OCI labels are populated (downstream registry
          # tooling reads these for description / license / source).
          docker inspect evidentia:smoke --format '{{json .Config.Labels}}' \
              | python -m json.tool

      - name: Smoke test — non-root execution
        run: |
          # Confirm the image runs as the `evidentia` user (uid 1000),
          # not root. A future regression that flips USER to root would
          # be caught here.
          uid=$(docker run --rm --entrypoint id evidentia:smoke -u)
          if [ "$uid" != "1000" ]; then
            echo "FAIL: container runs as uid $uid; expected 1000"
            exit 1
          fi
          echo "OK: container runs as uid $uid (non-root)"
