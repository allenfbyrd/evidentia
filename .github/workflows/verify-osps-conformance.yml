# Re-validates every claimed-PASS evidence link in OSPS-CONFORMANCE.md
# on every push to main, every PR, and weekly to catch link rot.
#
# If any evidence link returns HTTP 404 from `gh api`, this workflow
# fails — OSPS-CONFORMANCE.md must be updated (fix the link, restore
# the missing file, or downgrade the verdict to HONEST_GAP) before
# the next release.
#
# Threat model: see docs/threat-model.md §"v0.10.6 attack-surface
# delta" → "Guards: verify-osps-conformance.yml workflow" for the
# token-scope + rate-limit-DoS + workflow-injection + CodeQL-coverage
# analysis.
#
# Action pinning: every `uses:` line is pinned to a full commit SHA
# (not a tag) to pre-empt the OpenSSF Scorecard PinnedDependencies
# regression that the C7 hardening phase explicitly cleans up across
# all workflows. Comments after each SHA carry the resolved tag for
# human review.

name: verify-osps-conformance

on:
  # No `paths:` filter on push/PR — the workflow runs on every push and
  # every PR. The previous paths-filter (limited to OSPS-CONFORMANCE.md +
  # the workflow/validator/companion files) undermined the doc's PR-time
  # link-rot detection guarantee: a PR that deletes or renames any of
  # the 17 evidence-referenced files (SECURITY.md, LICENSE, etc.) would
  # NOT trigger this workflow, so link rot could land on main and only
  # the weekly cron would catch it. Cost of removing the filter: ~20s
  # per run; benefit: honors the doc's "catches regression PRs before
  # merge" contract.
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly Monday 03:00 UTC — catches link rot from out-of-band
    # repo changes (e.g., a file rename that doesn't go through PR
    # review). Offset from codeql.yml (Mon 12:00 UTC) + scorecard.yml
    # to spread CI load.
    - cron: '0 3 * * 1'
  # Allow manual re-runs from the Actions UI for diagnostic purposes.
  workflow_dispatch:

# Read-only defaults — workflow has no write surface. `gh api`
# read calls use the default GITHUB_TOKEN which is scoped to this
# repo only and is short-lived (~60 min).
permissions:
  contents: read
  actions: read

jobs:
  verify-conformance-evidence:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.12'

      - name: Install pyyaml
        run: pip install -r .github/workflows/requirements/verify-osps-conformance.txt --require-hashes

      - name: Parse OSPS-CONFORMANCE.md and verify evidence claims
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # v0.10.7 (D2.3): the parse + translate_url + 404-probe logic was
        # extracted from an inline `python <<'PY'` heredoc into
        # scripts/verify_osps_conformance.py so the URL-translation rules
        # can be unit-tested directly (tests/unit/test_verify_osps_
        # conformance.py). Behavior is unchanged — same regexes, same
        # translation rules, same hard-fail-on-unmapped-shape semantics,
        # same 404 detection + exit codes. This closes the TODO(v0.10.7)
        # marker / Issue #2 from the C3 review.
        run: python scripts/verify_osps_conformance.py

      - name: Validate machine-readable companion schema (if present)
        run: |
          if [ -f .local/pre-release-review/osps-conformance.yaml ]; then
            echo "::notice::Found .local/pre-release-review/osps-conformance.yaml; validating schema."
            python scripts/validate_osps_conformance_yaml.py \
              .local/pre-release-review/osps-conformance.yaml
          else
            echo "::warning::.local/pre-release-review/osps-conformance.yaml not present (gitignored — won't exist on fresh clones). Skipping schema check."
          fi
