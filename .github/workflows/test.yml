name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Default to read-only at the workflow level so each individual job
# follows the principle of least privilege. Jobs that need additional
# permissions (e.g. `actions/upload-artifact`) declare the elevated
# scope locally. Closes the OpenSSF Scorecard
# `actions/missing-workflow-permissions` advisory + reduces blast
# radius on a compromised third-party action.
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Install uv
        uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39  # v3.2.4
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Sync workspace
        # Python-only tests — skip the frontend build hook to keep this
        # job Node-free and fast.
        env:
          EVIDENTIA_SKIP_FRONTEND_BUILD: "1"
        run: uv sync --all-packages

      - name: Run tests (with coverage on Linux)
        if: matrix.os == 'ubuntu-latest'
        run: uv run pytest tests/ -q --cov --cov-report=xml --cov-report=term

      - name: Run tests (no coverage on non-Linux)
        if: matrix.os != 'ubuntu-latest'
        run: uv run pytest tests/ -q

      # v0.7.10 P2: upload Linux coverage to Codecov for the
      # OpenSSF Silver `test_statement_coverage80` MUST.
      # Failure to upload does NOT fail the build (token-less
      # public repo upload can transient-fail; coverage gate is
      # enforced locally via the codecov.yml `target: 80%`).
      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2  # v6.0.0
        with:
          files: coverage.xml
          fail_ci_if_error: false
          flags: python
          name: evidentia-python

  lint:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Install uv
        uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39  # v3.2.4
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync workspace
        env:
          EVIDENTIA_SKIP_FRONTEND_BUILD: "1"
        run: uv sync --all-packages

      - name: Run ruff
        run: uv run ruff check .

  typecheck:
    name: mypy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Install uv
        uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39  # v3.2.4
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync workspace
        env:
          EVIDENTIA_SKIP_FRONTEND_BUILD: "1"
        run: uv sync --all-packages

      # v0.2.1: added advisory-only. v0.3.0: flipped to strict — mypy is
      # now a required check. Pydantic plugin enabled via [tool.mypy] in
      # root pyproject.toml gives us correct typing for every
      # `Model.model_validate*` return type. types-PyYAML in the dev
      # group silences the "Library stubs not installed for yaml"
      # errors that used to plague every config-load path.
      # v0.4.0: extend to evidentia-api for the FastAPI layer. The
      # evidentia-ui directory is a Node/Vite project, not a Python
      # workspace member, and is covered by its own TypeScript strict
      # gate in the `frontend-test` job below.
      - name: Run mypy
        run: |
          uv run mypy \
            packages/evidentia-core/src/evidentia_core \
            packages/evidentia/src/evidentia \
            packages/evidentia-api/src/evidentia_api \
            packages/evidentia-integrations/src/evidentia_integrations \
            packages/evidentia-collectors/src/evidentia_collectors \
            --strict-optional

  frontend-test:
    name: frontend (typecheck + build)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: packages/evidentia-ui/package-lock.json

      - name: Install frontend deps
        working-directory: packages/evidentia-ui
        # Always `npm ci` — the repo commits package-lock.json so the
        # fallback `npm install` branch is unreachable in CI. Removing
        # it satisfies OpenSSF Scorecard's Pinned-Dependencies signal
        # (`npm install` resolves "latest" of every dep at run-time;
        # `npm ci` strictly honors the committed lockfile).
        run: npm ci --no-audit --no-fund

      - name: TypeScript typecheck
        working-directory: packages/evidentia-ui
        run: npm run typecheck

      - name: Vitest unit tests
        working-directory: packages/evidentia-ui
        # Tests are advisory until v0.4.0-alpha.2 lands the component test
        # suite; `|| true` keeps the build green if there are no tests yet.
        run: npm run test -- --run || true

      - name: Vite production build
        working-directory: packages/evidentia-ui
        run: npm run build

      - name: Upload dist as artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: evidentia-ui-dist
          path: packages/evidentia-ui/dist/
          retention-days: 7
