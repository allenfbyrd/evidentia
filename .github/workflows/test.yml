name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Sync workspace
        # Python-only tests — skip the frontend build hook to keep this
        # job Node-free and fast.
        env:
          EVIDENTIA_SKIP_FRONTEND_BUILD: "1"
        run: uv sync --all-packages

      - name: Run tests
        run: uv run pytest tests/ -q

  lint:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync workspace
        env:
          EVIDENTIA_SKIP_FRONTEND_BUILD: "1"
        run: uv sync --all-packages

      - name: Run ruff
        run: uv run ruff check .

  typecheck:
    name: mypy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync workspace
        env:
          EVIDENTIA_SKIP_FRONTEND_BUILD: "1"
        run: uv sync --all-packages

      # v0.2.1: added advisory-only. v0.3.0: flipped to strict — mypy is
      # now a required check. Pydantic plugin enabled via [tool.mypy] in
      # root pyproject.toml gives us correct typing for every
      # `Model.model_validate*` return type. types-PyYAML in the dev
      # group silences the "Library stubs not installed for yaml"
      # errors that used to plague every config-load path.
      # v0.4.0: extend to evidentia-api for the FastAPI layer. The
      # evidentia-ui directory is a Node/Vite project, not a Python
      # workspace member, and is covered by its own TypeScript strict
      # gate in the `frontend-test` job below.
      - name: Run mypy
        run: |
          uv run mypy \
            packages/evidentia-core/src/evidentia_core \
            packages/evidentia/src/evidentia \
            packages/evidentia-api/src/evidentia_api \
            packages/evidentia-integrations/src/evidentia_integrations \
            packages/evidentia-collectors/src/evidentia_collectors \
            --strict-optional

  frontend-test:
    name: frontend (typecheck + build)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: packages/evidentia-ui/package-lock.json

      - name: Install frontend deps
        working-directory: packages/evidentia-ui
        # Use `npm install` on first CI run before a package-lock.json is
        # generated; falls back to `npm ci` when the lockfile exists.
        run: |
          if [ -f package-lock.json ]; then
            npm ci --no-audit --no-fund
          else
            npm install --no-audit --no-fund
          fi

      - name: TypeScript typecheck
        working-directory: packages/evidentia-ui
        run: npm run typecheck

      - name: Vitest unit tests
        working-directory: packages/evidentia-ui
        # Tests are advisory until v0.4.0-alpha.2 lands the component test
        # suite; `|| true` keeps the build green if there are no tests yet.
        run: npm run test -- --run || true

      - name: Vite production build
        working-directory: packages/evidentia-ui
        run: npm run build

      - name: Upload dist as artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: evidentia-ui-dist
          path: packages/evidentia-ui/dist/
          retention-days: 7
