name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # v0.9.4 P4.5: allow operator-triggered manual re-runs so the
  # post-merge "is the merge flake really a flake?" debug loop
  # doesn't require pushing an empty commit. Surfaced during the
  # v0.9.3 ship-cycle investigation of the F-V93-Q4 flaky
  # TestJiraStatus test (gh workflow run had returned HTTP 422).
  workflow_dispatch:

# Default to read-only at the workflow level so each individual job
# follows the principle of least privilege. Jobs that need additional
# permissions (e.g. `actions/upload-artifact`) declare the elevated
# scope locally. Closes the OpenSSF Scorecard
# `actions/missing-workflow-permissions` advisory + reduces blast
# radius on a compromised third-party action.
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          version: "latest"
          # v0.9.5: disable cache on Windows runners — the Post Install
          # uv cache-save step has shown intermittent tar/zstd failures
          # on Windows that mark the whole job red despite all tests
          # passing (surfaced post-v0.9.4 merge commit a8e061c). uv
          # install itself is fast enough on Windows without the cache;
          # the marginal speedup isn't worth the false-failure noise.
          enable-cache: ${{ matrix.os != 'windows-latest' }}

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Sync workspace
        # Python-only tests — skip the frontend build hook to keep this
        # job Node-free and fast.
        env:
          EVIDENTIA_SKIP_FRONTEND_BUILD: "1"
        run: uv sync --all-packages

      - name: Run tests (with coverage on Linux)
        if: matrix.os == 'ubuntu-latest'
        run: uv run pytest tests/ -q --cov --cov-report=xml --cov-report=term

      - name: Run tests (no coverage on non-Linux)
        if: matrix.os != 'ubuntu-latest'
        run: uv run pytest tests/ -q

      # v0.7.10 P2: upload Linux coverage to Codecov for the
      # OpenSSF Silver `test_statement_coverage80` MUST.
      # Failure to upload does NOT fail the build; coverage gate
      # is enforced locally via the codecov.yml `target: 80%`.
      #
      # CODECOV_TOKEN is read from the repo's Actions secrets.
      # As of Codecov v6 (2024+), tokenless uploads from public
      # repos are rate-limited and sometimes silently dropped —
      # the explicit token resolves the "unknown" badge issue.
      # Set via `gh secret set CODECOV_TOKEN --body <token>`
      # after activating at https://app.codecov.io/.
      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354  # v6.0.1
        with:
          files: coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
          flags: python
          name: evidentia-python
          slug: polycentric-labs/evidentia
          verbose: true

  lint:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync workspace
        env:
          EVIDENTIA_SKIP_FRONTEND_BUILD: "1"
        run: uv sync --all-packages

      - name: Run ruff
        run: uv run ruff check .

  requirements-drift:
    name: docker/requirements drift
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Check for security-sensitive package drift
        run: uv run python scripts/check_requirements_drift.py

  openapi-drift:
    name: openapi schema drift
    runs-on: ubuntu-latest
    # Inherits the top-level `permissions: contents: read`; this job only
    # reads the tree and re-dumps the schema, so no elevated scope.
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync workspace
        # dump_openapi.py imports evidentia_api.app, so the workspace must
        # be installed. Skip the frontend build hook to keep this gate
        # Node-free — the TypeScript half of the parity chain is enforced
        # separately in the `frontend-test` job below.
        env:
          EVIDENTIA_SKIP_FRONTEND_BUILD: "1"
        run: uv sync --all-packages

      # First drift-gate of the GUI type-parity chain (see
      # scripts/dump_openapi.py): re-dump the live FastAPI schema and fail
      # if it diverged from the committed openapi.json. The second gate
      # (committed types vs. committed JSON) lives in `frontend-test`.
      - name: Regenerate openapi.json
        run: uv run python scripts/dump_openapi.py

      - name: Fail if openapi.json drifted from the live API schema
        run: |
          if ! git diff --exit-code -- packages/evidentia-ui/openapi.json; then
            echo "::error::packages/evidentia-ui/openapi.json is out of sync with the live FastAPI schema."
            echo "Run 'uv run python scripts/dump_openapi.py', then"
            echo "'npm --prefix packages/evidentia-ui run gen:types' to refresh the types,"
            echo "and commit both packages/evidentia-ui/openapi.json and"
            echo "packages/evidentia-ui/src/types/openapi.ts."
            exit 1
          fi

  osv-scan:
    name: osv-scanner (SBOM)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync workspace
        env:
          EVIDENTIA_SKIP_FRONTEND_BUILD: "1"
        # --all-extras --all-packages: identical dependency closure to
        # docs/release-checklist.md Step 5, so this CI gate and the
        # documented pre-push gate scan the same SBOM (v0.9.8
        # gate-fidelity lesson — a CI gate and its checklist counterpart
        # must run the same check).
        run: uv sync --all-extras --all-packages

      # osv-scanner surfaces transitive + DISPUTED advisories that the
      # Dependabot alert feed suppresses (the disputed pyjwt CVE that
      # slipped past v0.9.8's Row 14). Pinned by version + SHA256-
      # verified for the OpenSSF Scorecard Pinned-Dependencies signal.
      - name: Install osv-scanner (v2.3.8, checksum-verified)
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -sSfL https://github.com/google/osv-scanner/releases/download/v2.3.8/osv-scanner_linux_amd64 \
            -o "$HOME/.local/bin/osv-scanner"
          echo "bc98e15319ed0d515e3f9235287ba53cdc5535d576d24fd573978ecfe9ab92dc  $HOME/.local/bin/osv-scanner" | sha256sum -c -
          chmod +x "$HOME/.local/bin/osv-scanner"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run osv-scanner SBOM gate
        run: uv run --no-sync python scripts/run_osv_scan.py

  typecheck:
    name: mypy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync workspace
        env:
          EVIDENTIA_SKIP_FRONTEND_BUILD: "1"
        # --all-extras is required: without the optional extras
        # installed, mypy resolves sigstore / psycopg / etc. as Any
        # and silently skips type-checking every extra-gated path.
        run: uv sync --all-extras --all-packages

      # v0.2.1: added advisory-only. v0.3.0: flipped to strict — mypy is
      # now a required check. Pydantic plugin enabled via [tool.mypy] in
      # root pyproject.toml gives us correct typing for every
      # `Model.model_validate*` return type. types-PyYAML in the dev
      # group silences the "Library stubs not installed for yaml"
      # errors that used to plague every config-load path.
      # v0.4.0: extend to evidentia-api for the FastAPI layer. The
      # evidentia-ui directory is a Node/Vite project, not a Python
      # workspace member, and is covered by its own TypeScript strict
      # gate in the `frontend-test` job below.
      # v0.9.6 P4.3: extended to evidentia-ai + evidentia-mcp. The
      # Phase 0.3 scout reported 14 errors at v0.9.5 baseline; by the
      # Phase 4.3 re-scout (after Phase 2 + Phase 3 surfaced new
      # cross-package Pydantic models and the workspace re-resolved
      # the typing cache), the error count fell to 0. Adding a
      # `py.typed` marker to evidentia-mcp keeps consumers of the
      # package seeing the type annotations downstream. The gate
      # now covers all 7 evidentia-* packages (excluding evidentia-ui
      # which is a TypeScript / Node workspace member).
      - name: Run mypy
        run: |
          uv run mypy \
            packages/evidentia-core/src/evidentia_core \
            packages/evidentia/src/evidentia \
            packages/evidentia-api/src/evidentia_api \
            packages/evidentia-integrations/src/evidentia_integrations \
            packages/evidentia-collectors/src/evidentia_collectors \
            packages/evidentia-ai/src/evidentia_ai \
            packages/evidentia-mcp/src/evidentia_mcp \
            --strict-optional

  frontend-test:
    name: frontend (typecheck + build)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: packages/evidentia-ui/package-lock.json

      - name: Install frontend deps
        working-directory: packages/evidentia-ui
        # Always `npm ci` — the repo commits package-lock.json so the
        # fallback `npm install` branch is unreachable in CI. Removing
        # it satisfies OpenSSF Scorecard's Pinned-Dependencies signal
        # (`npm install` resolves "latest" of every dep at run-time;
        # `npm ci` strictly honors the committed lockfile).
        run: npm ci --no-audit --no-fund

      # Second drift-gate of the GUI type-parity chain (see
      # scripts/dump_openapi.py): regenerate the TypeScript types from the
      # committed openapi.json and fail if the committed types drifted. The
      # first gate (committed JSON vs. the live API) lives in the
      # `openapi-drift` job above.
      - name: Regenerate API types from openapi.json
        working-directory: packages/evidentia-ui
        run: npm run gen:types

      - name: Fail if committed API types drifted from openapi.json
        # Run at the repo root (default working-directory) so the pathspec
        # resolves the same way regardless of the npm working-directory.
        run: |
          if ! git diff --exit-code -- packages/evidentia-ui/src/types/openapi.ts; then
            echo "::error::packages/evidentia-ui/src/types/openapi.ts is out of sync with packages/evidentia-ui/openapi.json."
            echo "Run 'npm --prefix packages/evidentia-ui run gen:types' and commit"
            echo "packages/evidentia-ui/src/types/openapi.ts."
            exit 1
          fi

      - name: TypeScript typecheck
        working-directory: packages/evidentia-ui
        run: npm run typecheck

      - name: Vitest unit tests
        working-directory: packages/evidentia-ui
        # Tests are advisory until v0.4.0-alpha.2 lands the component test
        # suite; `|| true` keeps the build green if there are no tests yet.
        run: npm run test -- --run || true

      - name: Vite production build
        working-directory: packages/evidentia-ui
        run: npm run build

      - name: Upload dist as artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: evidentia-ui-dist
          path: packages/evidentia-ui/dist/
          retention-days: 7
