name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Sync workspace
        run: uv sync --all-packages

      - name: Run tests
        run: uv run pytest tests/ -q

  lint:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync workspace
        run: uv sync --all-packages

      - name: Run ruff
        run: uv run ruff check .

  typecheck:
    name: mypy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync workspace
        run: uv sync --all-packages

      # v0.2.1: added advisory-only. v0.3.0: flipped to strict — mypy is
      # now a required check. Pydantic plugin enabled via [tool.mypy] in
      # root pyproject.toml gives us correct typing for every
      # `Model.model_validate*` return type. types-PyYAML in the dev
      # group silences the "Library stubs not installed for yaml"
      # errors that used to plague every config-load path.
      - name: Run mypy
        run: |
          uv run mypy \
            packages/controlbridge-core/src/controlbridge_core \
            packages/controlbridge/src/controlbridge \
            --strict-optional
