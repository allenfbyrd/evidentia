# GitHub secret-scanning custom configuration.
#
# Excludes paths that intentionally contain credential-shaped strings
# for testing purposes (the secret scrubber's own unit tests, by
# design, embed canonical AWS / GitHub / Slack / etc. example
# credentials so the scrubber regex behavior can be verified). These
# strings are AWS-documented placeholders, not real credentials —
# false positives slow down real alert triage.
#
# All real-source paths (packages/**, .github/workflows/**, etc.)
# remain in scope for secret scanning.
#
# Doc: https://docs.github.com/en/code-security/secret-scanning/
#      using-advanced-secret-scanning-and-push-protection-features/
#      excluding-folders-and-files-from-secret-scanning

paths-ignore:
  # Test fixtures + scrubber tests — by-design example credentials.
  - "tests/**"
