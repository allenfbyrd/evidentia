# Custom CodeQL pack with Evidentia-specific QL sanitizers
# (v0.7.7 CF3 iteration #2 — proper QL after the data-extension
# YAML approach didn't fire on the v0.7.7 first attempt).
#
# Ships .qll library files that subclass the standard CodeQL
# Python sanitizer / barrier-guard abstract classes. The standard
# `py/path-injection` query picks up the sanitizer subclass
# automatically when this pack is in the analysis path (per the
# `packs:` declaration in `.github/codeql/codeql-config.yml`).
#
# References:
# - https://codeql.github.com/docs/codeql-language-guides/customizing-library-models-for-python/
# - https://github.com/github/codeql/blob/main/python/ql/lib/semmle/python/security/dataflow/PathInjectionCustomizations.qll

name: polycentric-labs/evidentia-python-sanitizers
version: 0.0.2
library: true

dependencies:
  codeql/python-all: "*"
