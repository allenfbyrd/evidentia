[project]
name = "evidentia-collectors"
version = "0.10.3"
description = "Evidence collection agents for AWS, Databricks, GitHub, Okta, Snowflake, SQL databases, and vendor-risk APIs (Vanta, Drata, BitSight, SecurityScorecard)"
readme = "README.md"
authors = [{name = "Allen Byrd", email = "allen@allenfbyrd.com"}]
license = "Apache-2.0"
requires-python = ">=3.12"
keywords = ["grc", "compliance", "evidence-collection", "aws", "databricks", "github", "okta", "snowflake", "sql", "tprm", "vendor-risk", "vanta", "drata", "bitsight", "securityscorecard"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Information Technology",
    "License :: OSI Approved :: Apache Software License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3.12",
    "Topic :: System :: Systems Administration",
    "Typing :: Typed",
]
dependencies = [
    "evidentia-core>=0.10.3,<0.11.0",
    "httpx>=0.27",
]

[project.optional-dependencies]
aws = ["boto3>=1.35"]
github = ["pygithub>=2.4"]
okta = ["okta>=2.9"]
# v0.7.7 P0: SQL family adapters. Each adapter is its own optional
# sub-extra so users only install what they need; the umbrella `sql`
# extra pulls in all of them.
sql-postgres = ["psycopg[binary]>=3.1"]
sql-mysql = ["PyMySQL>=1.1"]
# sqlite uses the stdlib sqlite3 module — no extra dep needed; the
# [sql-sqlite] extra is empty so users can declare intent
# consistently across the SQL family without surprises.
sql-sqlite = []
# pyodbc requires the OS-level Microsoft ODBC Driver 18; users must
# install it separately (see the [sql-mssql] section in
# packages/evidentia-collectors/src/evidentia_collectors/sql/mssql/__init__.py).
sql-mssql = ["pyodbc>=5.0"]
# Oracle's modern thin driver (oracledb 1.4+); pure-Python — no
# Oracle Client install needed for the default thin mode.
sql-oracle = ["oracledb>=2.0"]
sql = [
    "psycopg[binary]>=3.1",
    "PyMySQL>=1.1",
    "pyodbc>=5.0",
    "oracledb>=2.0",
]
# v0.7.8 P0.1: Databricks Unity Catalog + Workspace API collector.
# The databricks-sdk wraps both the workspace + account REST APIs
# and the SQL-statement-execution API for system-table queries.
# Auth handled by the SDK's unified config layer — supports
# DATABRICKS_TOKEN env (PAT), Azure AD, AWS IAM, OAuth M2M.
databricks = ["databricks-sdk>=0.30"]
# v0.7.8 P0.2: Snowflake account_usage + INFORMATION_SCHEMA collector.
# The snowflake-connector-python driver supports password (env var),
# key-pair, OAuth, and SSO auth modes. Password auth is being
# deprecated by Snowflake — production deployments should prefer
# key-pair auth (private key on disk, public key in
# `ALTER USER ... SET RSA_PUBLIC_KEY = ...`).
snowflake = ["snowflake-connector-python>=3.10"]
# v0.10.1: OCSF JSON ingestion (Prowler, AWS Security Hub). Wraps
# evidentia_core.ocsf (which lazy-imports py-ocsf-models). Mirrored
# under [ocsf] so `pip install 'evidentia-collectors[ocsf]'` Just Works
# — same operator-facing pattern as [aws] / [github] / etc.
ocsf = ["py-ocsf-models>=0.9.0,<0.10.0"]
all = [
    "boto3>=1.35",
    "pygithub>=2.4",
    "okta>=2.9",
    "psycopg[binary]>=3.1",
    "PyMySQL>=1.1",
    "pyodbc>=5.0",
    "oracledb>=2.0",
    "databricks-sdk>=0.30",
    "snowflake-connector-python>=3.10",
    "py-ocsf-models>=0.9.0,<0.10.0",
]

[project.urls]
Homepage = "https://github.com/polycentric-labs/evidentia"
Repository = "https://github.com/polycentric-labs/evidentia"
Issues = "https://github.com/polycentric-labs/evidentia/issues"
Changelog = "https://github.com/polycentric-labs/evidentia/blob/main/CHANGELOG.md"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/evidentia_collectors"]

[tool.uv.sources]
evidentia-core = { workspace = true }
