[project]
name = "evidentia-collectors"
version = "0.7.6"
description = "Evidence collection agents for AWS, Azure, GCP, GitHub, and Okta"
readme = "README.md"
authors = [{name = "Allen Byrd", email = "allen@allenfbyrd.com"}]
license = "Apache-2.0"
requires-python = ">=3.12"
keywords = ["grc", "compliance", "evidence-collection", "aws", "azure", "gcp", "github", "okta"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Information Technology",
    "License :: OSI Approved :: Apache Software License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3.12",
    "Topic :: System :: Systems Administration",
    "Typing :: Typed",
]
dependencies = [
    "evidentia-core>=0.7.0,<0.8.0",
    "httpx>=0.27",
]

[project.optional-dependencies]
aws = ["boto3>=1.35"]
azure = ["azure-identity>=1.19", "azure-mgmt-resource>=23.0"]
gcp = ["google-cloud-asset>=3.27"]
github = ["pygithub>=2.4"]
okta = ["okta>=2.9"]
# v0.7.7 P0: SQL family adapters. Each adapter is its own optional
# sub-extra so users only install what they need; the umbrella `sql`
# extra pulls in all of them.
sql-postgres = ["psycopg[binary]>=3.1"]
sql-mysql = ["PyMySQL>=1.1"]
# sqlite uses the stdlib sqlite3 module — no extra dep needed; the
# [sql-sqlite] extra is empty so users can declare intent
# consistently across the SQL family without surprises.
sql-sqlite = []
# pyodbc requires the OS-level Microsoft ODBC Driver 18; users must
# install it separately (see the [sql-mssql] section in
# packages/evidentia-collectors/src/evidentia_collectors/sql/mssql/__init__.py).
sql-mssql = ["pyodbc>=5.0"]
# sql-oracle lands in v0.7.7 P0.5.
sql = [
    "psycopg[binary]>=3.1",
    "PyMySQL>=1.1",
    "pyodbc>=5.0",
]
all = [
    "boto3>=1.35",
    "azure-identity>=1.19",
    "azure-mgmt-resource>=23.0",
    "google-cloud-asset>=3.27",
    "pygithub>=2.4",
    "okta>=2.9",
    "psycopg[binary]>=3.1",
    "PyMySQL>=1.1",
    "pyodbc>=5.0",
]

[project.urls]
Homepage = "https://github.com/allenfbyrd/evidentia"
Repository = "https://github.com/allenfbyrd/evidentia"
Issues = "https://github.com/allenfbyrd/evidentia/issues"
Changelog = "https://github.com/allenfbyrd/evidentia/blob/main/CHANGELOG.md"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/evidentia_collectors"]

[tool.uv.sources]
evidentia-core = { workspace = true }
