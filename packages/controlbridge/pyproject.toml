[project]
name = "controlbridge"
version = "0.4.1"
description = "Open-source GRC tool: gap analysis, risk statements, evidence collection, web UI, and compliance automation"
readme = "README.md"
authors = [{name = "Allen Byrd", email = "allen@allenfbyrd.com"}]
license = "Apache-2.0"
requires-python = ">=3.12"
keywords = ["grc", "compliance", "governance", "risk", "oscal", "nist", "soc2", "iso27001"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Information Technology",
    "License :: OSI Approved :: Apache Software License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3.12",
    "Topic :: Security",
    "Typing :: Typed",
]
dependencies = [
    "controlbridge-core>=0.4.0,<0.5.0",
    "controlbridge-ai>=0.4.0,<0.5.0",
    "controlbridge-collectors>=0.4.0,<0.5.0",
    "controlbridge-integrations>=0.4.0,<0.5.0",
    "typer>=0.14",
    "rich>=13.0",
]

[project.optional-dependencies]
# Web UI — installs the FastAPI server + bundled React SPA.
# Usage: `pip install "controlbridge[gui]"` or `uv tool install "controlbridge[gui]"`,
# then `controlbridge serve` to open the local web UI.
gui = ["controlbridge-api>=0.4.0,<0.5.0"]

[project.scripts]
controlbridge = "controlbridge.cli.main:app"
cb = "controlbridge.cli.main:app"

[project.urls]
Homepage = "https://github.com/allenfbyrd/controlbridge"
Documentation = "https://controlbridge.dev"
Repository = "https://github.com/allenfbyrd/controlbridge"
Changelog = "https://github.com/allenfbyrd/controlbridge/blob/main/CHANGELOG.md"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/controlbridge"]

[tool.uv.sources]
controlbridge-core = { workspace = true }
controlbridge-ai = { workspace = true }
controlbridge-collectors = { workspace = true }
controlbridge-integrations = { workspace = true }
controlbridge-api = { workspace = true }
