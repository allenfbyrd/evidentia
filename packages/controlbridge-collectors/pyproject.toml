[project]
name = "controlbridge-collectors"
version = "0.1.0"
description = "Evidence collection agents for AWS, Azure, GCP, GitHub, and Okta"
readme = "README.md"
license = {text = "Apache-2.0"}
requires-python = ">=3.12"
dependencies = [
    "controlbridge-core",
    "httpx>=0.27",
]

[project.optional-dependencies]
aws = ["boto3>=1.35"]
azure = ["azure-identity>=1.19", "azure-mgmt-resource>=23.0"]
gcp = ["google-cloud-asset>=3.27"]
github = ["pygithub>=2.4"]
okta = ["okta>=2.9"]
all = [
    "boto3>=1.35",
    "azure-identity>=1.19",
    "azure-mgmt-resource>=23.0",
    "google-cloud-asset>=3.27",
    "pygithub>=2.4",
    "okta>=2.9",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/controlbridge_collectors"]

[tool.uv.sources]
controlbridge-core = { workspace = true }
