[project]
name = "evidentia-ai"
version = "0.7.1"
description = "LLM-powered risk statement generator and evidence validator for Evidentia"
readme = "README.md"
authors = [{name = "Allen Byrd", email = "allen@allenfbyrd.com"}]
license = "Apache-2.0"
requires-python = ">=3.12"
keywords = ["grc", "compliance", "llm", "risk-statement", "nist-800-30", "litellm", "instructor"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Information Technology",
    "License :: OSI Approved :: Apache Software License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Typing :: Typed",
]
dependencies = [
    "evidentia-core>=0.7.0,<0.8.0",
    # v0.7.0 Step-3 review: pin LiteLLM above the compromised
    # 1.82.7 / 1.82.8 versions from the March 24, 2026 PyPI supply
    # chain incident (~40-min compromise window before quarantine).
    # uv.lock already pins to 1.83.0 (safe); this protects raw pip
    # users without lock-file hash verification.
    "litellm>=1.83.0,<2.0",
    "instructor>=1.6",
    "tenacity>=9.0",
]

[project.urls]
Homepage = "https://github.com/allenfbyrd/evidentia"
Repository = "https://github.com/allenfbyrd/evidentia"
Issues = "https://github.com/allenfbyrd/evidentia/issues"
Changelog = "https://github.com/allenfbyrd/evidentia/blob/main/CHANGELOG.md"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/evidentia_ai"]

[tool.uv.sources]
evidentia-core = { workspace = true }
