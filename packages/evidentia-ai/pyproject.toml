[project]
name = "evidentia-ai"
version = "0.10.4"
description = "LLM-powered risk statement generator and evidence validator for Evidentia"
readme = "README.md"
authors = [{name = "Allen Byrd", email = "allen@allenfbyrd.com"}]
license = "Apache-2.0"
requires-python = ">=3.12"
keywords = ["grc", "compliance", "llm", "risk-statement", "nist-800-30", "litellm", "instructor"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Information Technology",
    "License :: OSI Approved :: Apache Software License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Typing :: Typed",
]
dependencies = [
    "evidentia-core>=0.10.4,<0.11.0",
    # v0.10.5 P9: the DFAH eval harness was extracted to the
    # ``evidentia-eval`` workspace package so air-gap installs of
    # the production risk-statement runtime no longer pull the
    # dev-time eval stack. The package is kept as a runtime
    # dependency here so the v0.10.5 deprecation shims (``from
    # evidentia_ai.eval import …``) continue to work through
    # v0.11.x; v0.12.0 removes both the shims and this pin.
    "evidentia-eval>=0.10.4,<0.11.0",
    # v0.7.0 Step-3 review: pin LiteLLM above the compromised
    # 1.82.7 / 1.82.8 versions from the March 24, 2026 PyPI supply
    # chain incident (~40-min compromise window before quarantine).
    # v0.7.2 supply-chain follow-up: floor bumped to 1.83.7 to exclude
    # disclosed CVEs in the proxy server mode (GHSA-r75f-5x8p-qvmc
    # CRITICAL SQL injection, GHSA-xqmj-j6mv-4862 HIGH SSTI,
    # GHSA-v4p8-mg3p-g94g HIGH auth'd command exec via MCP stdio test
    # endpoints). Evidentia uses LiteLLM as a client library, not the
    # proxy server, so reachability is theoretical; bumped anyway.
    "litellm>=1.83.7,<2.0",
    "instructor>=1.6",
    "tenacity>=9.0",
]

[project.optional-dependencies]
# v0.10.5 P9: the v0.8.3 ``eval-faithfulness`` extra now proxies
# to ``evidentia-eval[faithfulness-semantic]``. Installing
# ``evidentia-ai[eval-faithfulness]`` continues to pull the same
# sentence-transformers + numpy stack — the heavy deps just
# live on the eval package now. Scheduled to track the v0.12.0
# shim removal: when ``evidentia_ai.eval`` is deleted, operators
# should install ``evidentia-eval[faithfulness-semantic]``
# directly.
eval-faithfulness = [
    "evidentia-eval[faithfulness-semantic]>=0.10.4,<0.11.0",
]

[project.urls]
Homepage = "https://github.com/polycentric-labs/evidentia"
Repository = "https://github.com/polycentric-labs/evidentia"
Issues = "https://github.com/polycentric-labs/evidentia/issues"
Changelog = "https://github.com/polycentric-labs/evidentia/blob/main/CHANGELOG.md"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/evidentia_ai"]

[tool.uv.sources]
evidentia-core = { workspace = true }
evidentia-eval = { workspace = true }
