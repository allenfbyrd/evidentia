[project]
name = "controlbridge-ai"
version = "0.1.0"
description = "LLM-powered risk statement generator and evidence validator for ControlBridge"
readme = "README.md"
license = {text = "Apache-2.0"}
requires-python = ">=3.12"
dependencies = [
    "controlbridge-core",
    "litellm>=1.50",
    "instructor>=1.6",
    "tenacity>=9.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/controlbridge_ai"]

[tool.uv.sources]
controlbridge-core = { workspace = true }
