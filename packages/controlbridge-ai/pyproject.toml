[project]
name = "controlbridge-ai"
version = "0.4.1"
description = "LLM-powered risk statement generator and evidence validator for ControlBridge"
readme = "README.md"
authors = [{name = "Allen Byrd", email = "allen@allenfbyrd.com"}]
license = "Apache-2.0"
requires-python = ">=3.12"
keywords = ["grc", "compliance", "llm", "risk-statement", "nist-800-30", "litellm", "instructor"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Information Technology",
    "License :: OSI Approved :: Apache Software License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Typing :: Typed",
]
dependencies = [
    "controlbridge-core>=0.4.0,<0.5.0",
    "litellm>=1.50,<2.0",
    "instructor>=1.6",
    "tenacity>=9.0",
]

[project.urls]
Homepage = "https://github.com/allenfbyrd/controlbridge"
Repository = "https://github.com/allenfbyrd/controlbridge"
Issues = "https://github.com/allenfbyrd/controlbridge/issues"
Changelog = "https://github.com/allenfbyrd/controlbridge/blob/main/CHANGELOG.md"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/controlbridge_ai"]

[tool.uv.sources]
controlbridge-core = { workspace = true }
