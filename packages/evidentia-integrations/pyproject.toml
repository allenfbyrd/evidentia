[project]
name = "evidentia-integrations"
version = "0.10.5"
description = "Output integrations for Jira and ServiceNow"
readme = "README.md"
authors = [{name = "Allen Byrd", email = "allen@allenfbyrd.com"}]
license = "Apache-2.0"
requires-python = ">=3.12"
keywords = ["grc", "compliance", "jira", "servicenow", "ticketing"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Information Technology",
    "License :: OSI Approved :: Apache Software License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3.12",
    "Topic :: System :: Systems Administration",
    "Typing :: Typed",
]
dependencies = [
    "evidentia-core>=0.10.5,<0.11.0",
    "httpx>=0.27",
]

[project.optional-dependencies]
jira = ["jira>=3.8"]
servicenow = ["pysnc>=1.1"]
# v0.7.8 P1.1: Tableau Server / Cloud publish integration. The
# tableauserverclient library is pure-Python and wraps the Tableau
# REST API with auth, sites, and data-source publishing. We ship
# CSV-datasource publish in v0.7.8; .hyper-extract publish (which
# would require the heavyweight `tableauhyperapi` native binary)
# is documented as a v0.7.9+ follow-up.
tableau = ["tableauserverclient>=0.30"]
# v0.7.8 P1.2: Power BI Push Datasets / Service Principal integration.
# msal handles the Azure AD service-principal OAuth2 flow; httpx
# (already a base dep) handles the actual Push Datasets API calls.
powerbi = ["msal>=1.31"]
all = [
    "jira>=3.8",
    "pysnc>=1.1",
    "tableauserverclient>=0.30",
    "msal>=1.31",
]

[project.urls]
Homepage = "https://github.com/polycentric-labs/evidentia"
Repository = "https://github.com/polycentric-labs/evidentia"
Issues = "https://github.com/polycentric-labs/evidentia/issues"
Changelog = "https://github.com/polycentric-labs/evidentia/blob/main/CHANGELOG.md"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/evidentia_integrations"]

[tool.uv.sources]
evidentia-core = { workspace = true }
