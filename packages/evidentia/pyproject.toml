[project]
name = "evidentia"
version = "0.10.5"
description = "Open-source GRC tool: gap analysis, risk statements, evidence collection, web UI, and compliance automation"
readme = "README.md"
authors = [{name = "Allen Byrd", email = "allen@allenfbyrd.com"}]
license = "Apache-2.0"
requires-python = ">=3.12"
keywords = ["grc", "compliance", "governance", "risk", "oscal", "nist", "soc2", "iso27001"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Information Technology",
    "License :: OSI Approved :: Apache Software License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3.12",
    "Topic :: Security",
    "Typing :: Typed",
]
dependencies = [
    "evidentia-core>=0.10.5,<0.11.0",
    "evidentia-ai>=0.10.5,<0.11.0",
    # v0.10.5 P9: DFAH eval harness extracted from evidentia-ai.
    # ``evidentia eval`` CLI verbs live here, so the meta-package
    # depends on evidentia-eval directly (not via the evidentia-ai
    # transitive pin) so the verbs work even when the v0.12.0
    # shim removal eventually trims evidentia-ai's runtime dep.
    "evidentia-eval>=0.10.5,<0.11.0",
    "evidentia-collectors>=0.10.5,<0.11.0",
    "evidentia-integrations>=0.10.5,<0.11.0",
    "typer>=0.14",
    "rich>=13.0",
]

[project.optional-dependencies]
# Web UI — installs the FastAPI server + bundled React SPA.
# Usage: `pip install "evidentia[gui]"` or `uv tool install "evidentia[gui]"`,
# then `evidentia serve` to open the local web UI.
gui = ["evidentia-api>=0.10.5,<0.11.0"]
# v0.7.12 P0: cloud-backed WORM storage adapters. Each extra
# pulls in the cloud SDK + maps to the matching evidentia-core
# extra so the WORM impl module imports cleanly. Operators
# typically install only the extra matching their cloud.
worm-s3 = ["evidentia-core[worm-s3]>=0.10.0,<0.11.0"]
worm-azure = ["evidentia-core[worm-azure]>=0.10.0,<0.11.0"]
worm-gcs = ["evidentia-core[worm-gcs]>=0.10.0,<0.11.0"]
# v0.8.0 P0.3: Model Context Protocol (MCP) server. Exposes
# Evidentia's gap-analysis, control-lookup, and gap-diff
# surfaces to MCP-aware AI clients (Claude Desktop, Claude
# Code, ChatGPT Desktop, custom clients) over stdio.
# Usage: `pip install "evidentia[mcp]"`, then `evidentia mcp
# serve`.
mcp = ["evidentia-mcp>=0.10.5,<0.11.0"]

[project.scripts]
evidentia = "evidentia.cli.main:app"
cb = "evidentia.cli.main:app"

[project.urls]
Homepage = "https://github.com/polycentric-labs/evidentia"
Documentation = "https://evidentia.dev"
Repository = "https://github.com/polycentric-labs/evidentia"
Changelog = "https://github.com/polycentric-labs/evidentia/blob/main/CHANGELOG.md"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/evidentia"]

[tool.uv.sources]
evidentia-core = { workspace = true }
evidentia-ai = { workspace = true }
evidentia-eval = { workspace = true }
evidentia-collectors = { workspace = true }
evidentia-integrations = { workspace = true }
evidentia-api = { workspace = true }
evidentia-mcp = { workspace = true }
