# OpenSSF OSPS Baseline - Maturity Level 2 catalog.
#
# v0.10.6+. First bundled OSPS Baseline catalog in Evidentia.
# Source: ossf/security-baseline, pinned at commit
# ac6bbec8aecf51dce41f62712745f7949ab6bdeb. Apache-2.0 licensed; Tier-A
# verbatim redistribution permitted.
#
# Catalog entries are OSPS assessment-requirements (granularity
# like OSPS-AC-04.01) - these are the testable conformance atoms.
# The upstream top-level control (e.g. OSPS-AC-04) groups
# multiple requirements and is preserved as the `title` field
# on each catalog entry. The OSCAL conversion at
# `osps-baseline.oscal.json` mirrors the top-level-control
# granularity instead, per the OSCAL Catalog convention.
#
# See docs/contributing-a-catalog.md for the schema reference
# and docs/api-stability.md "Revision history" v0.10.6 row.
#
# NOTE - solo-maintainer honest gaps for Evidentia v0.10.6:
# When Evidentia (1-maintainer Polycentric Labs project) claims
# OSPS-Baseline M2 conformance, the following requirements MUST
# be declared as honest-gaps in OSPS-CONFORMANCE.md because the
# controls assume >=2 maintainers / segregated CI/CD reviewers:
#   - OSPS-AC-04.01 (CI/CD job default-permissions; M2-and-up)
#   - OSPS-AC-04.02 (CI/CD job per-step permissions; M3 only -
#                   carried here for visibility)
#   - OSPS-GV-04.* (governance roles segregation)
#   - OSPS-QA-07.* (independent code review)

framework_id: osps-baseline-m2
framework_name: OpenSSF OSPS Baseline (Maturity Level 2)
version: 2026.02.19+m2
source: OpenSSF OSPS Baseline (https://github.com/ossf/security-baseline/tree/ac6bbec8aecf51dce41f62712745f7949ab6bdeb); pinned at commit ac6bbec8aecf51dce41f62712745f7949ab6bdeb
tier: A
category: control
placeholder: false
license_required: false
license_terms: Apache License 2.0 (OpenSSF OSPS Baseline). Verbatim redistribution permitted; Tier-A in Evidentia.
license_url: https://www.apache.org/licenses/LICENSE-2.0
families:
- Access Control
- Build and Release
- Documentation
- Governance
- Legal
- Quality
- Security Assessment
- Vulnerability Management
controls:
- id: OSPS-AC-01.01
  title: Use MFA for Sensitive Actions
  description: 'When a user attempts to read or modify a sensitive resource in the project''s

    authoritative repository, the system MUST require the user to complete

    a multi-factor authentication process.'
  family: Access Control
  objective: 'Reduce the risk of account compromise or insider threats by requiring

    multi-factor authentication for collaborators modifying the project

    repository settings or accessing sensitive data.'
  guidance: 'Enforce multi-factor authentication for the project''s version

    control system, requiring collaborators to provide a second form of

    authentication when accessing sensitive data or modifying repository

    settings. Passkeys are acceptable for this control.'
  tier: A
- id: OSPS-AC-02.01
  title: Restrict Collaborator Permissions
  description: 'When a new collaborator is added, the version control system MUST

    require manual permission assignment, or restrict the collaborator

    permissions to the lowest available privileges by default.'
  family: Access Control
  objective: 'Reduce the risk of unauthorized access to the project''s repository by

    limiting the permissions granted to new collaborators.'
  guidance: 'Most public version control systems are configured in this manner.

    Ensure the project''s version control system always assigns the lowest

    available permissions to collaborators by default when added, granting

    additional permissions only when necessary.'
  tier: A
- id: OSPS-AC-03.01
  title: Protect the Primary Branch from Accidental Modification
  description: 'When a direct commit is attempted on the project''s primary branch,

    an enforcement mechanism MUST prevent the change from being applied.'
  family: Access Control
  objective: 'Reduce the risk of accidental changes or deletion of the primary branch

    of the project''s repository by preventing unintentional modification.'
  guidance: 'If the VCS is centralized, set branch protection on the primary branch

    in the project''s VCS. Alternatively, use a decentralized approach,

    like the Linux kernel''s, where changes are first proposed in another

    repository, and merging changes into the primary repository requires a

    specific separate act.'
  tier: A
- id: OSPS-AC-03.02
  title: Protect the Primary Branch from Accidental Modification
  description: 'When an attempt is made to delete the project''s primary branch,

    the version control system MUST treat this as a sensitive activity

    and require explicit confirmation of intent.'
  family: Access Control
  objective: 'Reduce the risk of accidental changes or deletion of the primary branch

    of the project''s repository by preventing unintentional modification.'
  guidance: 'Set branch protection on the primary branch in the project''s version

    control system to prevent deletion.'
  tier: A
- id: OSPS-AC-04.01
  title: Enforce Least Privilege on CI/CD Pipelines
  description: 'When a CI/CD task is executed with no permissions specified, the

    CI/CD system MUST default the task''s permissions to the lowest

    permissions granted in the pipeline.'
  family: Access Control
  objective: 'Reduce the risk of unauthorized access to the project''s build and release

    processes by limiting the permissions granted to steps within the CI/CD

    pipelines.'
  guidance: 'Configure the project''s settings to assign the lowest available

    permissions to new pipelines by default, granting additional

    permissions only when necessary for specific tasks.'
  tier: A
- id: OSPS-BR-01.01
  title: Prevent Untrusted Input When Building & Releasing
  description: 'When a CI/CD pipeline operates on untrusted metadata, those

    parameters MUST be sanitized and validated prior to use in the

    pipeline.'
  family: Build and Release
  objective: 'Reduce the risk of code injection or other security vulnerabilities in the

    project''s build and release pipelines by preventing untrusted input from

    accessing privileged resources.'
  guidance: 'CI/CD pipelines should sanitize (quote, escape or exit on expected

    values) all metadata inputs which correspond to untrusted sources.

    This includes data such as branch names, commit messages, tags, pull request titles,

    and author information.'
  tier: A
- id: OSPS-BR-01.02
  title: Prevent Untrusted Input When Building & Releasing
  description: Retired in https://github.com/ossf/security-baseline/pull/443
  family: Build and Release
  objective: 'Reduce the risk of code injection or other security vulnerabilities in the

    project''s build and release pipelines by preventing untrusted input from

    accessing privileged resources.'
  guidance: 'Reduce the risk of code injection or other security vulnerabilities in the

    project''s build and release pipelines by preventing untrusted input from

    accessing privileged resources.'
  tier: A
- id: OSPS-BR-01.03
  title: Prevent Untrusted Input When Building & Releasing
  description: 'When a CI/CD pipeline operates on untrusted code snapshots, it MUST

    prevent access to privileged CI/CD credentials and assets.'
  family: Build and Release
  objective: 'Reduce the risk of code injection or other security vulnerabilities in the

    project''s build and release pipelines by preventing untrusted input from

    accessing privileged resources.'
  guidance: 'CI/CD pipelines should isolate untrusted code snapshots from

    privileged credentials and assets. In particular, projects should be

    careful to ensure that workflows which build or execute code prior

    to review by a collaborator do not have access to CI/CD credentials.'
  tier: A
- id: OSPS-BR-02.01
  title: Assign Unique Version Identifiers
  description: 'When an official release is created, that release MUST be assigned a

    unique version identifier.'
  family: Build and Release
  objective: 'Ensure that each software asset produced by the project is uniquely

    identified, enabling users to track changes and updates to the project

    over time.'
  guidance: 'Assign a unique version identifier to each release produced by the

    project, following a consistent naming convention or numbering scheme.

    Examples include SemVer, CalVer, or git commit id.'
  tier: A
- id: OSPS-BR-03.01
  title: Use Encrypted Channels for Development & Release Activity
  description: 'When the project lists a URI as an official project channel, that URI

    MUST be exclusively delivered using encrypted channels.'
  family: Build and Release
  objective: 'Protect the confidentiality and integrity of project source code during

    development, reducing the risk of eavesdropping or data tampering.'
  guidance: 'Configure the project''s websites and version control systems to use

    encrypted channels such as SSH or HTTPS for data transmission.

    Ensure all tools and domains referenced in project documentation can

    only be accessed via encrypted channels.'
  tier: A
- id: OSPS-BR-03.02
  title: Use Encrypted Channels for Development & Release Activity
  description: 'When the project lists a URI as an official distribution channel,

    that channel MUST be protected from adversary-in-the-middle

    attacks using cryptographically authenticated channels.'
  family: Build and Release
  objective: 'Protect the confidentiality and integrity of project source code during

    development, reducing the risk of eavesdropping or data tampering.'
  guidance: 'Artifacts distributed by the project should be distributed through

    channels which ensure integrity and authenticity. Use of HTTPS for

    downloads, signed releases, or distribution through trusted package

    managers are all acceptable methods to protect against

    adversary-in-the-middle attacks.'
  tier: A
- id: OSPS-BR-04.01
  title: Publish Change Log With Release
  description: 'When an official release is created, that release MUST contain

    a descriptive log of functional and security

    modifications.'
  family: Build and Release
  objective: 'Provide transparency and accountability for changes made to the project''s

    software releases in such a way that users can understand the

    modifications and improvements included in each release.'
  guidance: 'Ensure that all releases include a descriptive change log. It is

    recommended to ensure that the change log is human-readable and

    includes details beyond commit messages, such as descriptions of the

    security impact or relevance to different use cases. To ensure

    machine readability, place the content under a markdown header

    such as "## Changelog".'
  tier: A
- id: OSPS-BR-05.01
  title: Use Standardized Dependency Management Tools
  description: 'When a build and release pipeline ingests dependencies, it MUST

    use standardized tooling where available.'
  family: Build and Release
  objective: 'Ensure that the project''s build and release pipelines use standardized tools

    and processes to manage dependencies, reducing the risk of compatibility

    issues or security vulnerabilities in the software.'
  guidance: 'Use a common tooling for your ecosystem, such as package managers or

    dependency management tools to ingest dependencies at build time. This

    may include using a dependency file, lock file, or manifest to specify

    the required dependencies, which are then pulled in by the build

    system.'
  tier: A
- id: OSPS-BR-06.01
  title: Include Signatures and Hashes With Release
  description: 'When an official release is created, that release MUST be signed or

    accounted for in a signed manifest including each asset''s

    cryptographic hashes.'
  family: Build and Release
  objective: 'Ensure released software assets can be verified by users to ensure

    integrity of each asset when it is used.'
  guidance: 'Sign all released software assets at build time with a cryptographic

    signature or attestations, such as GPG or PGP signature, Sigstore

    signatures, SLSA provenance, or SLSA VSAs. Include the cryptographic

    hashes of each asset in a signed manifest or metadata file.'
  tier: A
- id: OSPS-DO-01.01
  title: Publish User Guides for Basic Functionality
  description: 'When the project has made a release, the project documentation MUST

    include user guides for all basic functionality.'
  family: Documentation
  objective: 'Ensure that users have a clear and comprehensive understanding of the

    project''s current features in order to prevent damage from misuse or

    misconfiguration.'
  guidance: 'Create user guides or documentation for all basic functionality of the

    project, explaining how to install, configure, and use the project''s

    features. If there are any known dangerous or destructive actions

    available, include highly-visible warnings.'
  tier: A
- id: OSPS-DO-02.01
  title: Provide Mechanisms for Reporting Defects
  description: 'When the project has made a release, the project documentation MUST

    include a guide for reporting defects.'
  family: Documentation
  objective: 'Enable users and contributors to report defects or issues with the

    released software assets, facilitating communication and collaboration on

    defect fixes and improvements.'
  guidance: 'It is recommended that projects use their VCS default issue tracker.

    If an external source is used, ensure that the project documentation

    and contributing guide clearly and visibly explain how to use the

    reporting system. It is recommended that project documentation also

    sets expectations for how defects will be triaged and resolved.'
  tier: A
- id: OSPS-DO-06.01
  title: Publish Dependency Management Policy
  description: 'When the project has made a release, the project documentation MUST

    include a description of how the project selects, obtains, and tracks

    its dependencies.'
  family: Documentation
  objective: 'Provide information about how the project selects, obtains, and tracks

    third-party components that are required for the software to function.'
  guidance: 'It is recommended to publish this information alongside the project''s

    technical & design documentation on a publicly viewable resource such

    as the source code repository, project website, or other channel.'
  tier: A
- id: OSPS-DO-07.01
  title: Provide Instructions on How to Build From Source
  description: 'The project documentation MUST

    include instructions on how to build the software, including required

    libraries, frameworks, SDKs, and dependencies.'
  family: Documentation
  objective: 'Ensure that users have a clear and comprehensive instructions on how

    to build the software from source code.'
  guidance: 'It is recommended to publish this information alongside the project''s

    contributor documentation, such as in `CONTRIBUTING.md` or other

    developer task documentation. This may also be documented using

    `Makefile` targets or other automation scripts.'
  tier: A
- id: OSPS-GV-01.01
  title: Publish Project Roles and Responsibilities
  description: 'While active, the project documentation MUST include a list of

    project members with access to sensitive resources.'
  family: Governance
  objective: 'Document project roles and responsibilities to help project participants,

    potential contributors, and downstream consumers understand who is working

    on the project and what areas of authority they may have.'
  guidance: 'Document project participants and their roles through such artifacts

    as members.md, governance.md, maintainers.md, or similar file within

    the source code repository of the project.

    This may be as simple as including names or account handles in a list

    of maintainers, or more complex depending on the project''s governance.'
  tier: A
- id: OSPS-GV-01.02
  title: Publish Project Roles and Responsibilities
  description: 'While active, the project documentation MUST include descriptions of

    the roles and responsibilities for members of the project.'
  family: Governance
  objective: 'Document project roles and responsibilities to help project participants,

    potential contributors, and downstream consumers understand who is working

    on the project and what areas of authority they may have.'
  guidance: 'Document project participants and their roles through such artifacts

    as members.md, governance.md, maintainers.md, or similar file within

    the source code repository of the project.'
  tier: A
- id: OSPS-GV-02.01
  title: Provide Public Discussion Mechanisms
  description: 'While active, the project MUST have one or more mechanisms for public

    discussions about proposed changes and usage obstacles.'
  family: Governance
  objective: 'Encourage open communication and collaboration within the project

    community by enabling users to provide feedback and discuss proposed

    changes or usage challenges.'
  guidance: 'Establish one or more mechanisms for public discussions within the

    project, such as mailing lists, instant messaging, or issue trackers,

    to facilitate open communication and feedback.'
  tier: A
- id: OSPS-GV-03.01
  title: Publish Contribution Guide
  description: 'While active, the project documentation MUST include an explanation

    of the contribution process.'
  family: Governance
  objective: 'Provide guidance on how to participate in the project, outlining the steps

    required to submit changes or enhancements to the project''s codebase.'
  guidance: 'Create a CONTRIBUTING.md or CONTRIBUTING/ directory to outline the

    contribution process including the steps for submitting changes, and

    engaging with the project maintainers.'
  tier: A
- id: OSPS-GV-03.02
  title: Publish Contribution Guide
  description: 'While active, the project documentation MUST include a guide for code

    contributors that includes requirements for acceptable contributions.'
  family: Governance
  objective: 'Provide guidance on how to participate in the project, outlining the steps

    required to submit changes or enhancements to the project''s codebase.'
  guidance: 'Extend the CONTRIBUTING.md or CONTRIBUTING/ contents in the project

    documentation to outline the requirements for acceptable

    contributions, including coding standards, testing requirements, and

    submission guidelines for code contributors. It is recommended that

    this guide is the source of truth for both contributors and approvers.'
  tier: A
- id: OSPS-LE-01.01
  title: Require Code Contributors to Assert Right to Commit
  description: 'While active, the version control system MUST require all code

    contributors to assert that they are legally authorized to make the

    associated contributions on every commit.'
  family: Legal
  objective: 'Ensure that code contributors are aware of and acknowledge their legal

    responsibility for the contributions they make to the project, reducing

    the risk of intellectual property disputes against the project.'
  guidance: 'Include a DCO in the project''s repository, requiring code

    contributors to assert that they are legally authorized to commit the

    associated contributions on every commit. Use a status check to ensure

    the assertion is made. A CLA also satisfies this requirement.

    Some version control systems, such as GitHub, may include this in the

    platform terms of service.


    It is understood that projects with a lengthy history prior to

    adopting OSPS Baseline may not be able to retroactively enforce this

    requirement.'
  tier: A
- id: OSPS-LE-02.01
  title: Ensure Project Licenses are Fully Open Source
  description: 'While active, the license for the source code MUST meet the OSI Open

    Source Definition or the FSF Free Software Definition.'
  family: Legal
  objective: 'Ensure that the project''s source code is distributed under a recognized

    and legally enforceable open source software license, providing clarity on

    how the code can be used and shared by others.'
  guidance: 'Add a LICENSE file to the project''s repo with a license that is an

    approved license by the Open Source Initiative (OSI), or a free

    license as approved by the Free Software Foundation (FSF). Examples of

    such licenses include the MIT, BSD 2-clause, BSD 3-clause revised,

    Apache 2.0, Lesser GNU General Public License (LGPL), and the GNU

    General Public License (GPL). Releasing to the public domain meets

    this control if there are no other encumbrances such as patents.'
  tier: A
- id: OSPS-LE-02.02
  title: Ensure Project Licenses are Fully Open Source
  description: 'While active, the license for the released software assets MUST meet

    the OSI Open Source Definition or the FSF Free Software Definition.'
  family: Legal
  objective: 'Ensure that the project''s source code is distributed under a recognized

    and legally enforceable open source software license, providing clarity on

    how the code can be used and shared by others.'
  guidance: 'If a different license is included with released software assets,

    ensure it is an approved license by the Open Source Initiative (OSI),

    or a free license as approved by the Free Software Foundation (FSF).

    Examples of such licenses include the MIT, BSD 2-clause, BSD 3-clause

    revised, Apache 2.0, Lesser GNU General Public License (LGPL), and the

    GNU General Public License (GPL). Note that the license for the

    released software assets may be different than the source code.'
  tier: A
- id: OSPS-LE-03.01
  title: Maintain and Release Licenses in a Well Known Location
  description: 'While active, the license for the source code MUST be maintained in

    the corresponding repository''s LICENSE file, COPYING file,

    LICENSES/ directory, or LICENSE/ directory.'
  family: Legal
  objective: 'Ensure that the project''s source code and released software assets are

    distributed with the appropriate license terms, making it clear to users

    and contributors how each can be used and shared.'
  guidance: 'Include the project''s source code license in the project''s LICENSE

    file, COPYING file, LICENSES/ directory, or LICENSE/ directory

    to provide visibility and

    clarity on the licensing terms. The filename MAY have an extension.

    If the project has multiple repositories, ensure that each repository

    includes the license file.'
  tier: A
- id: OSPS-LE-03.02
  title: Maintain and Release Licenses in a Well Known Location
  description: 'While active, the license for the released software assets MUST be

    included in the released source code, or in a LICENSE file, COPYING

    file, or LICENSE/ directory alongside the corresponding release

    assets.'
  family: Legal
  objective: 'Ensure that the project''s source code and released software assets are

    distributed with the appropriate license terms, making it clear to users

    and contributors how each can be used and shared.'
  guidance: 'Include the project''s released software assets license in the released

    source code, or in a LICENSE file, COPYING file, or LICENSE/ directory

    alongside the corresponding release assets to provide visibility and

    clarity on the licensing terms. The filename MAY have an extension.

    If the project has multiple repositories, ensure that each repository

    includes the license file.'
  tier: A
- id: OSPS-QA-01.01
  title: Publish Source Code and Change History
  description: 'While active, the project''s source code repository MUST be publicly

    readable at a static URL.'
  family: Quality
  objective: 'Enable users to access and review the project''s source code and history,

    promoting transparency and collaboration within the project community.'
  guidance: 'Use a common VCS such as GitHub, GitLab, or Bitbucket. Ensure the

    repository is publicly readable. Avoid duplication or mirroring of

    repositories unless highly visible documentation clarifies the primary

    source. Avoid frequent changes to the repository that would impact the

    repository URL. Ensure the repository is public.'
  tier: A
- id: OSPS-QA-01.02
  title: Publish Source Code and Change History
  description: 'The version control system MUST contain a publicly readable record of

    all changes made, who made the changes, and when the changes were

    made.'
  family: Quality
  objective: 'Enable users to access and review the project''s source code and history,

    promoting transparency and collaboration within the project community.'
  guidance: 'Use a common VCS such as GitHub, GitLab, or Bitbucket to maintain a

    publicly readable commit history. Avoid squashing or rewriting commits

    in a way that would obscure the author of any commits.'
  tier: A
- id: OSPS-QA-02.01
  title: Publish Software Dependencies
  description: 'When the package management system supports it, the source code

    repository MUST contain a dependency list that accounts for the direct

    language dependencies.'
  family: Quality
  objective: 'Provide transparency and accountability for the project''s dependencies

    while enabling users and contributors to understand the software''s direct

    dependencies.'
  guidance: 'This may take the form of a package manager or language dependency file

    that enumerates all direct dependencies such as package.json, Gemfile,

    or go.mod.'
  tier: A
- id: OSPS-QA-03.01
  title: Address Pass/Fail Checks Before Accepting Changes
  description: 'When a commit is made to the primary branch, any automated status

    checks for commits MUST pass or be manually bypassed.'
  family: Quality
  objective: 'Ensure that the project''s approvers do not become accustomed to tolerating

    failing status checks, even if arbitrary, because it increases the risk of

    overlooking security vulnerabilities or defects identified by automated

    checks.'
  guidance: 'Configure the project''s version control system to require that all

    automated status checks pass or require manual acknowledgement before a

    commit can be merged into the primary branch. It is recommended that

    any optional status checks are NOT configured as a pass or fail

    requirement that approvers may be tempted to bypass.'
  tier: A
- id: OSPS-QA-04.01
  title: Enforce Security Requirements on All Codebases
  description: 'Projects with multiple repositories MUST document a list of codebases

    that are part of the project.'
  family: Quality
  objective: 'Ensure that all codebases produced by the project are well

    documented and held to the same security standard.'
  guidance: 'Document any additional subproject code repositories produced by the

    project and compiled into a release. This documentation should include

    the status and intent of the respective codebase.'
  tier: A
- id: OSPS-QA-05.01
  title: Prevent Executables in the Codebase
  description: 'While active, the version control system MUST NOT contain generated

    executable artifacts.'
  family: Quality
  objective: 'Reduce the risk of including generated executable artifacts in the

    project''s version control system, ensuring that only source code and

    necessary files are stored in the repository.'
  guidance: 'Remove generated executable artifacts in the project''s version control

    system. It is recommended that any scenario where a generated

    executable artifact appears critical to a process such as testing, it

    should be instead be generated at build time or stored separately and

    fetched during a specific well-documented pipeline step.'
  tier: A
- id: OSPS-QA-05.02
  title: Prevent Executables in the Codebase
  description: 'While active, the version control system MUST NOT contain unreviewable

    binary artifacts.'
  family: Quality
  objective: 'Reduce the risk of including generated executable artifacts in the

    project''s version control system, ensuring that only source code and

    necessary files are stored in the repository.'
  guidance: 'Do not add any unreviewable binary artifacts to the project''s version

    control system. This includes executable application binaries, library

    files, and similar artifacts. It does not include assets such as

    graphical images, sound or music files, and similar content typically

    stored in a binary format.'
  tier: A
- id: OSPS-QA-06.01
  title: Use Automated Testing in CI/CD Pipelines
  description: 'Prior to a commit being accepted, the project''s CI/CD pipelines MUST

    run at least one automated test suite to ensure the changes meet

    expectations.'
  family: Quality
  objective: 'Ensure that the project uses at least one automated test suite for the

    source code repository and clearly documents when and how tests are run.'
  guidance: 'Automated tests should be run prior to every merge into the primary

    branch. The test suite should be run in a CI/CD pipeline and the

    results should be visible to all contributors. The test suite should

    be run in a consistent environment and should be run in a way that

    allows contributors to run the tests locally.

    Examples of test suites include unit tests, integration tests, and

    end-to-end tests.'
  tier: A
- id: OSPS-SA-01.01
  title: Publish Design Descriptions of System Actors and Actions
  description: 'When the project has made a release, the project documentation MUST

    include design documentation demonstrating all actions and actors

    within the system.'
  family: Security Assessment
  objective: 'Provide an overview of the project''s design and architecture, illustrating

    the interactions and components of the system to help contributors and

    security reviewers understand the internal logic of the released software

    assets.'
  guidance: 'Include designs in the project documentation that explains the actions

    and actors. Actors include any subsystem or entity that can influence

    another segment in the system.

    Ensure this is updated for new features or breaking changes.'
  tier: A
- id: OSPS-SA-02.01
  title: Publish External Interface Descriptions
  description: 'When the project has made a release, the project documentation MUST

    include descriptions of all external software interfaces of the

    released software assets.'
  family: Security Assessment
  objective: 'Provide users and developers with an understanding of how to interact with

    the project''s software and integrate it with other systems, enabling them

    to use the software effectively.'
  guidance: 'Document all software interfaces (APIs) of the released software

    assets, explaining how users can interact with the software and what

    data is expected or produced.

    Ensure this is updated for new features or breaking changes.'
  tier: A
- id: OSPS-SA-03.01
  title: Maintain a Project Security Assessment
  description: 'When the project has made a release, the project MUST perform a

    security assessment to understand the most likely and impactful

    potential security problems that could occur within the software.'
  family: Security Assessment
  objective: 'Provide project maintainers an understanding of how the software can be

    misused or broken, enabling them to plan mitigations accordingly.'
  guidance: 'Performing a security assessment informs both project members as well

    as downstream consumers that the project understands what problems

    could arise within the software. Understanding what threats could be

    realized helps the project manage and address risk. This information

    is useful to downstream consumers to demonstrate the security acumen

    and practices of the project.

    Ensure this is updated for new features or breaking changes.'
  tier: A
- id: OSPS-VM-01.01
  title: Publish Coordinated Vulnerability Disclosure Policy
  description: 'While active, the project documentation MUST

    include a policy for coordinated vulnerability disclosure (CVD), with a clear

    timeframe for response.'
  family: Vulnerability Management
  objective: 'Establish a process for reporting and addressing vulnerabilities in the

    project, ensuring that security issues are handled promptly and

    transparently.'
  guidance: 'Create a SECURITY.md file at the root of the directory, outlining the

    project''s policy for coordinated vulnerability disclosure. Include a

    method for reporting vulnerabilities. Set expectations for how the

    project will respond and address reported issues.'
  tier: A
- id: OSPS-VM-03.01
  title: Maintain Private Vulnerability Reporting Process
  description: 'While active, the project documentation MUST

    provide a means for private vulnerability reporting directly to

    the security contacts within the project.'
  family: Vulnerability Management
  objective: 'Provide a means for reporting privately to the security contacts within

    the project so that security vulnerabilities are not be shared with the

    public until the project has been provided time to analyze and prepare

    remediations to protect users of the project.'
  guidance: 'Provide a means for security researchers to report vulnerabilities

    privately to the project. This may be a dedicated email address, a

    web form, VCS specialized tools, email addresses for security

    contacts, or other methods.'
  tier: A
- id: OSPS-VM-04.01
  title: Publish Discovered Vulnerabilities
  description: 'While active, the project documentation MUST

    publicly publish data about discovered vulnerabilities.'
  family: Vulnerability Management
  objective: 'Ensure that project end users have a well known mechanism to understand

    vulnerabilities found within the project.'
  guidance: 'Provide information about known vulnerabilities in a predictable

    public channel, such as a CVE entry, blog post, or other medium.

    To the degree possible, this information should include affected

    version(s), how a consumer can determine if they are vulnerable, and

    instructions for mitigation or remediation.'
  tier: A
