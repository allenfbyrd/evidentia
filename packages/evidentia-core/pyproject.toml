[project]
name = "evidentia-core"
version = "0.7.3"
description = "Core data models, catalog loading, and gap analysis engine for Evidentia GRC tool"
readme = "README.md"
authors = [{name = "Allen Byrd", email = "allen@allenfbyrd.com"}]
license = "Apache-2.0"
requires-python = ">=3.12"
keywords = ["grc", "compliance", "oscal", "nist", "soc2", "risk", "gap-analysis", "pydantic"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Information Technology",
    "License :: OSI Approved :: Apache Software License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Typing :: Typed",
]
dependencies = [
    "pydantic>=2.9",
    "pydantic-settings>=2.6",
    "pyyaml>=6.0",
    "python-dateutil>=2.9",
    "thefuzz[speedup]>=0.22",
    "platformdirs>=4.3",
    # v0.7.0: audit module deps. tenacity drives bounded
    # exponential-backoff retry with jitter; python-ulid produces
    # time-sortable 128-bit unique IDs used for event.id and run_id
    # in the ECS/OpenTelemetry log schema.
    "tenacity>=9.0",
    "python-ulid>=3.0",
]

[project.optional-dependencies]
# v0.7.0: Sigstore/Rekor signing for enterprise-grade evidence integrity.
# Pulls ~30 MB of crypto + cosign deps; only install if you need it.
# Not compatible with air-gap mode (Sigstore requires network access to
# Fulcio + Rekor for signing). Air-gap deployments stay on GPG.
sigstore = ["sigstore>=3.0"]

[project.urls]
Homepage = "https://github.com/allenfbyrd/evidentia"
Repository = "https://github.com/allenfbyrd/evidentia"
Issues = "https://github.com/allenfbyrd/evidentia/issues"
Changelog = "https://github.com/allenfbyrd/evidentia/blob/main/CHANGELOG.md"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/evidentia_core"]
