[project]
name = "evidentia-core"
version = "0.7.15"
description = "Core data models, catalog loading, and gap analysis engine for Evidentia GRC tool"
readme = "README.md"
authors = [{name = "Allen Byrd", email = "allen@allenfbyrd.com"}]
license = "Apache-2.0"
requires-python = ">=3.12"
keywords = ["grc", "compliance", "oscal", "nist", "soc2", "risk", "gap-analysis", "pydantic"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Information Technology",
    "License :: OSI Approved :: Apache Software License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Typing :: Typed",
]
dependencies = [
    "pydantic>=2.9",
    "pydantic-settings>=2.6",
    "pyyaml>=6.0",
    "python-dateutil>=2.9",
    "thefuzz[speedup]>=0.22",
    "platformdirs>=4.3",
    # v0.7.0: audit module deps. tenacity drives bounded
    # exponential-backoff retry with jitter; python-ulid produces
    # time-sortable 128-bit unique IDs used for event.id and run_id
    # in the ECS/OpenTelemetry log schema.
    "tenacity>=9.0",
    "python-ulid>=3.0",
]

[project.optional-dependencies]
# v0.7.0: Sigstore/Rekor signing for enterprise-grade evidence integrity.
# Pulls ~30 MB of crypto + cosign deps; only install if you need it.
# Not compatible with air-gap mode (Sigstore requires network access to
# Fulcio + Rekor for signing). Air-gap deployments stay on GPG.
sigstore = ["sigstore>=3.0"]
# v0.7.9 P0.2 second slice: Excel (.xlsx) output / ingestion for the
# TPRM due-diligence questionnaire generator. openpyxl is ~3 MB pure-
# Python; gated behind an extra so default installs stay slim.
xlsx = [
    "openpyxl>=3.1",
]
# v0.7.12 P0: cloud-backed WORM (Write-Once-Read-Many) storage
# adapters for regulator-grade audit chain-of-custody. The local-
# filesystem reference impl ships in v0.7.11 with no cloud
# dependency; the cloud-side impls below are gated behind extras
# so default installs stay slim. Operators install the extra
# matching their cloud (or all three for multi-cloud setups).
#
# All three backends implement the same WORMBackend ABC; switching
# clouds is a constructor swap. See docs/worm-backends.md for
# operator setup runbooks (bucket creation with Object Lock,
# IAM policies, legal-hold workflow).
worm-s3 = [
    "boto3>=1.34.0",
]
worm-azure = [
    "azure-storage-blob>=12.19.0",
    "azure-identity>=1.16.0",
]
worm-gcs = [
    "google-cloud-storage>=2.18.0",
]

[project.urls]
Homepage = "https://github.com/allenfbyrd/evidentia"
Repository = "https://github.com/allenfbyrd/evidentia"
Issues = "https://github.com/allenfbyrd/evidentia/issues"
Changelog = "https://github.com/allenfbyrd/evidentia/blob/main/CHANGELOG.md"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/evidentia_core"]
