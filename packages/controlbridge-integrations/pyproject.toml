[project]
name = "controlbridge-integrations"
version = "0.1.0"
description = "Output integrations for Jira and ServiceNow"
readme = "README.md"
license = {text = "Apache-2.0"}
requires-python = ">=3.12"
dependencies = [
    "controlbridge-core",
    "httpx>=0.27",
]

[project.optional-dependencies]
jira = ["jira>=3.8"]
servicenow = ["pysnc>=1.1"]
all = ["jira>=3.8", "pysnc>=1.1"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/controlbridge_integrations"]

[tool.uv.sources]
controlbridge-core = { workspace = true }
