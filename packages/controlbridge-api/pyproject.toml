[project]
name = "controlbridge-api"
version = "0.5.0"
description = "FastAPI REST server + bundled React web UI for ControlBridge"
readme = "README.md"
authors = [{name = "Allen Byrd", email = "allen@allenfbyrd.com"}]
license = "Apache-2.0"
requires-python = ">=3.12"
keywords = ["grc", "compliance", "fastapi", "web-ui", "oscal", "rest-api"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Information Technology",
    "License :: OSI Approved :: Apache Software License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3.12",
    "Topic :: Internet :: WWW/HTTP :: HTTP Servers",
    "Topic :: Security",
    "Framework :: FastAPI",
    "Typing :: Typed",
]
dependencies = [
    "controlbridge-core>=0.5.0,<0.6.0",
    "controlbridge-ai>=0.5.0,<0.6.0",
    "fastapi>=0.115",
    "uvicorn[standard]>=0.30",
    "python-multipart>=0.0.9",
    "sse-starlette>=2.1",
]

[project.urls]
Homepage = "https://github.com/allenfbyrd/controlbridge"
Repository = "https://github.com/allenfbyrd/controlbridge"
Issues = "https://github.com/allenfbyrd/controlbridge/issues"
Changelog = "https://github.com/allenfbyrd/controlbridge/blob/main/CHANGELOG.md"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/controlbridge_api"]
# The static/ subdirectory is populated at build time by the custom
# hatchling build hook (hatch_build.py). The hook runs `npm run build`
# in packages/controlbridge-ui/ and copies dist/* into
# src/controlbridge_api/static/ before wheel assembly. Set the env var
# CONTROLBRIDGE_SKIP_FRONTEND_BUILD=1 to bypass the hook in Python-only
# build environments.

[tool.hatch.build.hooks.custom]
path = "hatch_build.py"

[tool.uv.sources]
controlbridge-core = { workspace = true }
controlbridge-ai = { workspace = true }
