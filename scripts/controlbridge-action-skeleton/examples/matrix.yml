name: Compliance Gap Analysis (per-environment)

on:
  pull_request:
    paths:
      - "environments/**/controls.yaml"

jobs:
  gap-analysis:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    strategy:
      fail-fast: false
      matrix:
        environment: [staging, prod]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: allenfbyrd/controlbridge-action@v1
        with:
          inventory: environments/${{ matrix.environment }}/controls.yaml
          frameworks: nist-800-53-rev5-moderate,soc2-tsc
          comment-tag: "controlbridge-${{ matrix.environment }}"
          # Only fail-on-regression for production; staging is advisory.
          fail-on-regression: ${{ matrix.environment == 'prod' }}
