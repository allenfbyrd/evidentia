# version_tracked_files.yaml — the single source of truth for where the
# Evidentia project version (NOT third-party dependency versions) lives.
#
# Evidentia v0.10.7 Phase E2. This manifest is the "never-skip-a-version-
# reference" backbone. TWO scripts read it:
#
#   * scripts/bump_version.py            — drives the per-file replacement
#                                          when bumping (e.g. --to 0.10.8).
#   * scripts/check_version_consistency.py — (1) verifies every `tracked`
#                                          file actually holds the current
#                                          version, and (2) hard-fails on any
#                                          git-tracked file that contains a
#                                          project-version literal yet appears
#                                          in NEITHER `tracked` NOR `frozen`.
#
# The source of truth for "the current version" is the
# packages/evidentia-core/pyproject.toml `version = "X.Y.Z"` field (the same
# detector bump_version.py has always used).
#
# ───────────────────────────────────────────────────────────────────────────
# SCHEMA
# ───────────────────────────────────────────────────────────────────────────
#
# tracked:
#   A list of entries. Each entry describes ONE replacement the bumper makes
#   and ONE coverage assertion the consistency-check makes. Fields:
#
#     path:    repo-relative path OR a glob (e.g. "packages/*/pyproject.toml").
#              Globs expand against the git-tracked file list.
#     kind:    the replacement strategy (see below). Selects both the regex
#              the consistency-check uses for COVERAGE and the rewrite the
#              bumper applies.
#     desc:    human note (why this file is tracked / what the literal is).
#
#   kind values (each maps to tested logic in bump_version.py — the complex
#   inter-package-pin logic is NOT re-encoded as a raw regex here so the
#   F-V100-M1 workspace-allowlist guard and the (?!\.\d) hot-fix lookahead
#   stay in one tested place):
#
#     python_version       — `version = "X.Y.Z"` in a pyproject.toml / TOML.
#                            Uses the (?!\.\d) lookahead (hot-fix X.Y.Z.W safe).
#     workspace_pins       — inter-package pins `<member>>=X.Y.Z,<M.(m+1).0`.
#                            Substitution is delegated to bump_pin_range() over
#                            the [tool.uv.sources] workspace allowlist, so ONLY
#                            workspace members are touched (third-party pins
#                            with the same range shape are left alone — the
#                            F-V100-M1 guard). Coverage for this kind is
#                            advisory (a file may legitimately carry no
#                            workspace pins, e.g. evidentia-core itself).
#     json_version         — `"version": "X.Y.Z"` in a package.json.
#     pip_extra_pin        — `evidentia[gui]==X.Y.Z` (Dockerfile / requirements.in).
#                            Coverage is advisory: the literal may legitimately
#                            lag (docker/requirements.in tracks the last
#                            *published* release, not the in-prep bump) and the
#                            Dockerfile carries no such literal at all (it
#                            installs from docker/requirements.txt).
#     cff_version          — `version: X.Y.Z` in CITATION.cff (unquoted YAML).
#     cff_date             — `date-released: 'YYYY-MM-DD'` in CITATION.cff.
#                            The bumper sets this to the bump date (UTC).
#                            Coverage does NOT assert the date (it is a date,
#                            not the version).
#     readme_container_tag — `ghcr.io/polycentric-labs/evidentia:vX.Y.Z` in
#                            README.md. TIGHTLY anchored to the container-pull
#                            line so it can NEVER match the historical release-
#                            note lines elsewhere in the README.
#
# frozen:
#   An allowlist of paths/globs whose project-version literals are
#   INTENTIONALLY historical (CHANGELOG entries, dated security-review docs,
#   per-version plan docs, source-code docstrings like "(v0.7.1)" or "removed
#   in v0.12.0", test fixtures that hardcode `collector_version="0.7.0"`,
#   workflow audit-trail comments, generated lockfiles, the marketplace plugin
#   which versions on its own cadence, etc.). These must NOT be bumped and must
#   NOT be flagged by the never-skip check. Entries are repo-relative paths or
#   globs; globs expand against the git-tracked file list.
#
# anchors:
#   A line-scoped OVERLAY for files that are otherwise `frozen` WHOLESALE yet
#   still carry ONE (or a few) LIVE "current version" claim(s) that MUST track
#   the release. The motivating case: a doc whose body is full of historical
#   version literals (so the whole file is `frozen`, exempting it from
#   never-skip) but which ALSO has a "Latest release: vX.Y.Z" line that goes
#   silently stale because the file's frozen membership suppresses every check.
#   An anchor re-arms exactly that one live line WITHOUT un-freezing the file's
#   historical literals. Fields:
#
#     path:          repo-relative path OR a glob. Globs expand against the
#                    git-tracked file list.
#     line_contains: a LITERAL substring (not a regex) that uniquely identifies
#                    the live-version line(s). EVERY line in the file containing
#                    this substring is an "anchored line". Choose it PRECISELY:
#                    an anchored line must hold EXACTLY ONE in-family project-
#                    version literal (see the EXACTLY-ONE rule below), so the
#                    substring must be specific enough that the matched line
#                    carries the single live version and no second in-family
#                    literal (no historical project version, no third-party
#                    `>=0.7` dependency version, on the same physical line).
#     desc:          human note (why this live line must track the release).
#
#   Semantics:
#     * EXACTLY-ONE-LIVE-LITERAL (HARD requirement, both tools): every anchored
#       line MUST carry EXACTLY ONE in-family project-version literal (the
#       `0.7.x`..`0.99.x` family the bumper's ANCHOR_VERSION_RE / the checker's
#       PROJECT_VERSION_RE match). ZERO literals OR MORE THAN ONE literal on an
#       anchored line is a HARD ERROR in BOTH the bumper and the checker. This
#       closes the multi-literal footgun: a marker line that also carries a
#       SECOND in-family literal (a historical project version like
#       `Latest: v0.10.7 (was v0.10.6)`, OR a third-party dependency version
#       `>=0.7` on the same line) would otherwise be silently corrupted by the
#       force-set AND let the checker pass a stale live token. If a line trips
#       the >1 guard, pick a more specific `line_contains` so exactly ONE live
#       version is anchored (or split the live claim onto its own line).
#     * BUMP (bump_version.py): on each anchored line, the SINGLE project-version
#       literal is FORCE-SET to the target — regardless of the line's prior
#       value (so a stale 0.10.6 becomes 0.10.7 even though the normal
#       cur->target replacement would not have matched 0.10.6). A leading `v`
#       is preserved (`:v0.10.6` -> `:v0.10.7`). Only the X.Y.Z(.W) numeric on
#       the anchored line is touched; other text on the line is untouched (the
#       file's line endings are normalized to LF on write-back, shared with the
#       tracked loop). The force-set runs even when current == target, so a
#       drifted anchor is fixable on any invocation.
#     * COVERAGE (check_version_consistency.py): the SINGLE literal on each
#       anchored line MUST EQUAL the CURRENT version (not merely appear
#       somewhere on the line). An anchored line showing an old version is a
#       HARD FAIL (this is the safeguard the wholesale `frozen` membership
#       defeats). Anchors are ALWAYS coverage-required.
#     * MISCONFIG GUARDS (both tools): an anchor entry missing/mistyping its
#       required `path` / `line_contains` keys (clean error, not a raw
#       KeyError), an anchor whose `path` matches no git-tracked file, whose
#       `line_contains` matches 0 lines, whose anchored line carries NO project-
#       version literal, or whose anchored line carries MORE THAN ONE project-
#       version literal is a HARD FAIL.
#     * CLASSIFICATION: an anchor is an OVERLAY, not a substitute for never-skip
#       classification. An anchor's file MUST ALSO appear in `tracked` OR
#       `frozen` (so never-skip already classifies it). An anchor file in
#       NEITHER is a HARD FAIL.
#
#   Example (illustrative — DO NOT uncomment without a real live-in-frozen line):
#     anchors:
#       - path: "SECURITY.md"
#         line_contains: "Latest patched release:"
#         desc: >-
#           SECURITY.md is frozen wholesale (its CVE-disposition narrative cites
#           historical versions), but the "Latest patched release: vX.Y.Z" line
#           is a LIVE claim that must track each ship. The marker is precise
#           enough that the matched line carries exactly ONE live version (no
#           "(was vX.Y.Z-1)" tail, no dep pin) per the EXACTLY-ONE rule above.
#
# ───────────────────────────────────────────────────────────────────────────
# Adding a new file that carries the project version?  Add it to `tracked`
# (with a kind) so the bumper updates it AND the check guards it. If the
# literal is historical, add it to `frozen` instead. If the file is historical
# WHOLESALE but holds one live "current version" line, keep it in `frozen` AND
# add an `anchors` overlay for that line. The check will refuse to pass until
# you classify each project-version literal one way or another.
# ───────────────────────────────────────────────────────────────────────────

tracked:
  # ── Python packages: version field + inter-package pins ────────────────
  - path: "packages/*/pyproject.toml"
    kind: python_version
    desc: "The [project].version of each of the 8 workspace packages."
  - path: "packages/*/pyproject.toml"
    kind: workspace_pins
    desc: >-
      Inter-package dependency pins (`evidentia-core>=X.Y.Z,<M.(m+1).0` etc.).
      Only [tool.uv.sources] workspace members are rewritten — F-V100-M1 guard.
  - path: "pyproject.toml"
    kind: python_version
    desc: "The workspace-root [project].version (evidentia-workspace)."
  - path: "pyproject.toml"
    kind: workspace_pins
    desc: "Root pyproject carries no inter-package pins today; kept for symmetry."

  # ── Web UI package.json ────────────────────────────────────────────────
  - path: "packages/evidentia-ui/package.json"
    kind: json_version
    desc: "The @evidentia/ui frontend package version (kept in lockstep)."

  # ── Container build pins ───────────────────────────────────────────────
  - path: "Dockerfile"
    kind: pip_extra_pin
    desc: >-
      `evidentia[gui]==X.Y.Z` literal (historically pinned directly; today the
      image installs from docker/requirements.txt, so this usually matches 0).
  - path: "docker/requirements.in"
    kind: pip_extra_pin
    desc: >-
      `evidentia[gui]==X.Y.Z` pin compiled into docker/requirements.txt. Tracks
      the last *published* release; the release-time regeneration re-pins it.

  # ── Citation metadata (NEW in v0.10.7 E2) ──────────────────────────────
  - path: "CITATION.cff"
    kind: cff_version
    desc: "GitHub 'Cite this repository' widget version. NEWLY tracked (E2)."
  - path: "CITATION.cff"
    kind: cff_date
    desc: "`date-released` — set to the bump date (UTC) by the bumper. NEW (E2)."

  # ── README container tag (NEW in v0.10.7 E2) ───────────────────────────
  - path: "README.md"
    kind: readme_container_tag
    desc: >-
      The `docker pull ghcr.io/polycentric-labs/evidentia:vX.Y.Z` line.
      Tightly anchored so it does NOT match historical release-note lines.
      NEWLY tracked (E2) — was previously skipped, drifting to a stale tag.

  # ── Marketplace plugin manifest (TRACKED in v0.10.7 review) ────────────
  - path: "marketplace/grc-engineering-suite/plugins/evidentia/.claude-plugin/plugin.json"
    kind: json_version
    desc: >-
      The GRC-Engineering marketplace plugin version. Per the plugin's own
      README §Versioning it "tracks the Evidentia release line" (plugin.json
      mirrors the evidentia-mcp release it targets), so it is tracked here and
      bumped in lockstep. The plugin README is NOT tracked: its install
      examples are unpinned and its §Versioning prose is version-agnostic, so
      the README carries no project-version literal to bump — it stays frozen
      below for its historical docs/v0.10.2-marketplace.md plan-doc link.

frozen:
  # ── Whole historical/prose trees (globs) ───────────────────────────────
  - path: "docs/**"
    desc: "Release-note prose, dated security-review docs, per-version plans, runbooks — all historical."
  - path: "tests/**"
    desc: "Version literals here are test fixtures + historical docstrings; bumping them would break assertions."
  - path: "packages/*/src/**"
    desc: "Source docstrings/comments carry historical version annotations like '(v0.7.1)' / 'removed in v0.12.0'."
  - path: ".github/**"
    desc: "Workflow + action + CodeQL audit-trail comments referencing the cycle they were added in."
  - path: "scripts/**"
    desc: "Tooling docstrings/comments (incl. this manifest's two reader scripts) carry historical version notes."
  - path: "marketplace/**"
    desc: >-
      The GRC-Engineering marketplace plugin tree. Its canonical version
      (.claude-plugin/plugin.json) is TRACKED above — the plugin "tracks the
      Evidentia release line" per its own README §Versioning, so plugin.json
      mirrors the monorepo version and is bumped in lockstep. Everything else
      under this tree is frozen: the plugin README (version-agnostic install
      examples + prose, plus the historical docs/v0.10.2-marketplace.md
      plan-doc link) and commands/. plugin.json is matched by this glob too;
      that is harmless — the bumper drives only off `tracked`, and the
      never-skip classified set is a union of tracked + frozen.
  - path: "examples/**"
    desc: "Sample evidentia.yaml configs with 'feature added since vN.M' comments."

  # ── Per-package non-tracked files (siblings of tracked files) ──────────
  - path: "packages/*/README.md"
    desc: "Package READMEs carry historical narrative (e.g. evidentia-eval/README.md extraction note)."
  - path: "packages/evidentia-ui/package-lock.json"
    desc: "Generated npm lockfile; full of coincidental dependency versions."
  - path: "packages/evidentia-ui/eslint.config.js"
    desc: "Historical comments ('v0.7.14 P0.3 ESLint 10 flat-config')."
  - path: "packages/evidentia-ui/vite.config.ts"
    desc: "Historical comments ('v0.7.15: tailwindcss v4 plugin')."

  # ── Generated / compiled artifacts ─────────────────────────────────────
  - path: "uv.lock"
    desc: "Generated by `uv sync`; regenerated post-bump. Coincidental dep versions + the 8 workspace entries."
  - path: "docker/requirements.txt"
    desc: "Hash-pinned compiled output; regenerated at release time by release.yml against PyPI bytes."

  # ── Root-level historical / governance / config files ──────────────────
  - path: "CHANGELOG.md"
    desc: "Every shipped release block — the canonical historical record."
  - path: "SECURITY.md"
    desc: "Supported-version table + historical CVE-disposition narrative."
  - path: "docs/archive/RENAMED.md"
    desc: >-
      ControlBridge→Evidentia rename history (shim removal at v0.7.0). Archived
      under docs/archive/ in v0.10.7 E9; also covered by the docs/** glob above,
      kept here for an explicit per-file record.
  - path: "GOVERNANCE.md"
    desc: "Historical governance narrative referencing release milestones."
  - path: "CONTRIBUTING.md"
    desc: "Contributor guide with historical version references."
  - path: "OSPS-CONFORMANCE.md"
    desc: "OSPS Baseline self-attestation referencing the cycle it was authored in."
  - path: "EOL.md"
    desc: "End-of-life policy table listing historical release dates."
  - path: "Evidentia-Architecture-and-Implementation-Plan.md"
    desc: "The canonical in-repo architecture plan; references many historical versions."
  - path: "codecov.yml"
    desc: "Comment '# commit since v0.7.10'."
  - path: "mkdocs.yml"
    desc: "Docs-site config with historical version references."
  - path: "osv-scanner.toml"
    desc: "Vuln-allowlist `reason` strings cite the cycle each disposition was made in."
  - path: ".cursorrules"
    desc: "Editor-rules file with historical version references."
  - path: ".yamllint"
    desc: "Lint config comment referencing the cycle it was added in."
  - path: ".pre-commit-config.yaml"
    desc: "Hook config comment referencing the cycle it was added in."
  - path: ".markdownlint.yaml"
    desc: "Lint config comment referencing the cycle it was added in."
  - path: ".githooks/pre-push"
    desc: "Pre-push gate header cites 'Evidentia v0.10.7 Phase D5' + check provenance."
  - path: ".devcontainer/devcontainer.json"
    desc: "Devcontainer config comment referencing the cycle it was added in."

  # ── This manifest's own reader scripts live under scripts/** (above) ───
  #    so no separate entry is needed for scripts/version_tracked_files.yaml.

# anchors:
#   Line-scoped overlays for live "current version" lines inside files that
#   are `frozen` wholesale. See the SCHEMA header above for full semantics +
#   an illustrative example.
#
#   These re-arm every LIVE "this is the current release" example that lives in
#   an otherwise-historical (frozen) file so it auto-tracks each ship instead of
#   silently going stale (the SECURITY.md / docker pin drift that motivated the
#   mechanism). Each marker is chosen to be VERSION-AGNOSTIC (it does not embed
#   the current literal) so it keeps matching across future bumps, and to land
#   on lines that carry EXACTLY ONE in-family project-version literal per the
#   EXACTLY-ONE rule in the SCHEMA header.
#
#   NOTE on mirrors: the wiki "mirror" pages under docs/wiki/6-project/ are
#   GENERATED from these canonical sources by scripts/wiki/sync_mirrors.py (the
#   --check drift gate is wired into sync-wiki.yml). We anchor the SOURCE
#   (SECURITY.md, docs/ROADMAP.md, docs/verification.md); the corresponding
#   mirrors (6-project/security.md, /roadmap.md, /verification.md) inherit the
#   new literal on the next `sync_mirrors.py` run and are deliberately NOT
#   anchored here. The standalone wiki pages below (1-getting-started/*,
#   2-guides/air-gapped-install.md, 6-project/versioning.md) are NOT mirrors —
#   they are canonical themselves; versioning.md carries no live end-version
#   after its WS1-B reword, so it needs no anchor.
anchors:
  # ── SECURITY.md (frozen wholesale) ─────────────────────────────────────
  - path: "SECURITY.md"
    line_contains: "Latest patch"
    desc: >-
      Supported-versions table row 1 ("| **`X.Y.Z`** | Supported | Latest
      patch. ..."). The live "currently supported patch" claim. Reworded in
      WS1-B so the row carries exactly ONE in-family literal (the
      `docs/security-review-*.md` glob has no version); the deprecated row no
      longer says "Latest patch", so this marker is single-line.
  - path: "SECURITY.md"
    line_contains: "py3-none-any.whl"
    desc: >-
      The `pypi-attestations verify pypi "pypi:evidentia-X.Y.Z-py3-none-any.whl"`
      example in the "Verify a release wheel" block — a LIVE verification recipe
      that must name the current wheel. Single in-family literal on the line.

  # ── docs/ROADMAP.md (frozen via docs/**) ───────────────────────────────
  - path: "docs/ROADMAP.md"
    line_contains: "Last updated:"
    desc: >-
      The "**Last updated: vX.Y.Z (...).**" banner on line 3 — a LIVE "this
      roadmap reflects release X" claim. Already current; anchoring locks it so
      it can never drift behind a ship. (Mirrored to 6-project/roadmap.md by
      sync_mirrors.py — the mirror is not anchored.)

  # ── docker/requirements.in (also `tracked` as pip_extra_pin) ───────────
  - path: "docker/requirements.in"
    line_contains: "evidentia[gui]=="
    desc: >-
      The `evidentia[gui]==X.Y.Z` pin compiled into docker/requirements.txt.
      The pip_extra_pin `tracked` kind treats its coverage as advisory (the pin
      legitimately lags the in-prep bump), so the literal had drifted 14 patches
      behind (0.9.1). This anchor FORCE-REFRESHES it to the current release on
      every bump, closing the lag. Single in-family literal on the line.

  # ── docs/verification.md (SOURCE of the 6-project/verification.md mirror)
  - path: "docs/verification.md"
    line_contains: "py3-none-any.whl"
    desc: >-
      The three PEP 740 wheel-name examples (the single-wheel verify line, its
      "OK:" expected-output line, and the per-release sweep `"pypi:${pkg}-..."`
      line). Each carries exactly ONE in-family literal. LIVE recipes naming the
      current wheels.
  - path: "docs/verification.md"
    line_contains: "evidentia:v"
    desc: >-
      The two `cosign verify ... ghcr.io/polycentric-labs/evidentia:vX.Y.Z`
      container lines (verify + verify-attestation). Single in-family literal
      each. The "container image at `...evidentia`" prose line (no `:v` tag) is
      NOT matched. LIVE container-verification recipes.
  - path: "docs/verification.md"
    line_contains: "@refs/tags/v"
    desc: >-
      The two `--certificate-identity-regexp "...release.yml@refs/tags/vX.Y.Z"`
      lines — the cosign identity regex must name the current tag. Single
      in-family literal each.
  - path: "docs/verification.md"
    line_contains: "gh release download v"
    desc: >-
      The `gh release download vX.Y.Z --pattern ...` SBOM-download example —
      a LIVE recipe that must name the current release tag. Single literal.

  # ── docs/wiki/1-getting-started/quickstart.md (canonical wiki page) ────
  - path: "docs/wiki/1-getting-started/quickstart.md"
    line_contains: "Evidentia v"
    desc: >-
      The `# → Evidentia vX.Y.Z / Python 3.12.x` version-output example. Single
      in-family literal (the Python 3.12 is below-family). LIVE expected-output.
  - path: "docs/wiki/1-getting-started/quickstart.md"
    line_contains: "py3-none-any.whl"
    desc: >-
      The PEP 740 verify line + its "OK:" expected-output line in Step 5. Each
      single-literal. LIVE artifact-chain verification recipe.
  - path: "docs/wiki/1-getting-started/quickstart.md"
    line_contains: "evidentia:v"
    desc: >-
      The `cosign verify ... evidentia:vX.Y.Z` container line. Single literal.
      (The adjacent `--certificate-identity-regexp '...@refs/tags/v.*'` line
      uses a wildcard `v.*` — no in-family literal — so it is NOT matched.)

  # ── docs/wiki/1-getting-started/installation.md (canonical wiki page) ──
  - path: "docs/wiki/1-getting-started/installation.md"
    line_contains: "Evidentia v"
    desc: >-
      The two `# → Evidentia vX.Y.Z / Python 3.12.x` version-output examples
      (PyPI-install verify + container-run verify). Single in-family literal
      each. LIVE expected-output.
  - path: "docs/wiki/1-getting-started/installation.md"
    line_contains: "evidentia:v"
    desc: >-
      The four `ghcr.io/polycentric-labs/evidentia:vX.Y.Z` container lines
      (docker pull, docker run, the mounted-run continuation, and cosign
      verify). Single in-family literal each. NOTE: the
      `evidentia-core>=X.Y.Z,<X.(Y+1).0` resolver-pin EXAMPLE further down
      carries TWO in-family literals and is `evidentia-core>` (not `evidentia:v`)
      — it is intentionally NOT matched and stays frozen as a historical pin
      illustration.

  # ── docs/wiki/2-guides/air-gapped-install.md (canonical wiki page) ─────
  #   The tarball filename was reworded version-agnostic (`evidentia.tar`) so the
  #   `docker pull` + `docker save` container-tag lines are single-literal and
  #   anchorable (the `docker load -i evidentia.tar` line carries no version).
  #   The save/load block + the version-output line are all anchored now — zero
  #   live-drift surface on this page (WS1-D follow-up closure, 2026-05-29).
  - path: "docs/wiki/2-guides/air-gapped-install.md"
    line_contains: "evidentia:v"
    desc: >-
      The two `ghcr.io/polycentric-labs/evidentia:vX.Y.Z` container lines
      (`docker pull` + `docker save`). Single in-family literal each (the
      tarball name is now version-agnostic). LIVE current-release recipe.
  - path: "docs/wiki/2-guides/air-gapped-install.md"
    line_contains: "Evidentia v"
    desc: >-
      The `# → Evidentia vX.Y.Z / Python 3.12.x` post-offline-install verify
      line. Single in-family literal. LIVE expected-output.
