name: "Evidentia Compliance Gap Analysis"
description: "Run Evidentia gap analysis and PR-level diff on every pull request. Blocks merges that regress compliance posture."
author: "Allen Byrd <allen@allenfbyrd.com>"
branding:
  icon: "shield"
  color: "blue"

inputs:
  inventory:
    description: "Path to the control inventory file (YAML/JSON/CSV, relative to repo root)."
    required: true
  frameworks:
    description: "Comma-separated framework IDs to analyze against."
    required: true
  base-ref:
    description: "Git ref to diff against (default: the PR's base branch)."
    required: false
    default: ""
  fail-on-regression:
    description: "Exit with status 1 if new gaps are opened or severities increase. Blocks PR merge."
    required: false
    default: "true"
  comment-tag:
    description: "Unique marker used to find + replace the existing PR comment (prevents duplicate comments on successive pushes)."
    required: false
    default: "evidentia-gap-diff"
  github-token:
    description: "Token used to post the diff as a PR comment. Defaults to the workflow's GITHUB_TOKEN."
    required: false
    default: ${{ github.token }}
  evidentia-version:
    description: "Evidentia version to install (e.g. '0.4.0'). Defaults to latest from PyPI."
    required: false
    default: "latest"

outputs:
  gaps-opened:
    description: "Number of new gaps introduced in the head ref."
    value: ${{ steps.diff.outputs.opened }}
  gaps-closed:
    description: "Number of gaps closed in the head ref."
    value: ${{ steps.diff.outputs.closed }}
  severity-increased:
    description: "Number of gaps whose severity increased."
    value: ${{ steps.diff.outputs.severity_increased }}
  severity-decreased:
    description: "Number of gaps whose severity decreased."
    value: ${{ steps.diff.outputs.severity_decreased }}
  is-regression:
    description: "'true' if any gap opened or severity increased."
    value: ${{ steps.diff.outputs.is_regression }}

runs:
  using: "composite"
  steps:
    - name: Set up Python 3.12 + uv
      uses: astral-sh/setup-uv@v3
      with:
        version: "latest"
        enable-cache: true

    - name: Install Evidentia
      shell: bash
      run: |
        if [ "${{ inputs.evidentia-version }}" = "latest" ]; then
          uv tool install evidentia
        else
          uv tool install "evidentia==${{ inputs.evidentia-version }}"
        fi
        evidentia version

    - name: Analyze head
      shell: bash
      env:
        INVENTORY: ${{ inputs.inventory }}
        FRAMEWORKS: ${{ inputs.frameworks }}
      run: |
        evidentia gap analyze \
          --inventory "$INVENTORY" \
          --frameworks "$FRAMEWORKS" \
          --output head-report.json
        cat head-report.json | python -c "import json,sys; r=json.load(sys.stdin); print(f'Head: {r[\"total_gaps\"]} gaps, {r[\"critical_gaps\"]} critical')"

    - name: Resolve base ref
      id: base
      shell: bash
      run: |
        BASE_REF="${{ inputs.base-ref }}"
        if [ -z "$BASE_REF" ]; then
          if [ -n "${{ github.base_ref }}" ]; then
            BASE_REF="${{ github.base_ref }}"
          else
            BASE_REF="main"
          fi
        fi
        echo "ref=$BASE_REF" >> "$GITHUB_OUTPUT"

    - name: Analyze base
      shell: bash
      env:
        BASE_REF: ${{ steps.base.outputs.ref }}
        INVENTORY: ${{ inputs.inventory }}
        FRAMEWORKS: ${{ inputs.frameworks }}
      run: |
        git fetch --depth=1 origin "$BASE_REF"
        git worktree add base-worktree "origin/$BASE_REF" || git worktree add base-worktree "$BASE_REF"
        (cd base-worktree && evidentia gap analyze \
          --inventory "$INVENTORY" \
          --frameworks "$FRAMEWORKS" \
          --output "../base-report.json") || true
        # If the base ref lacks the inventory file or fails for any reason,
        # treat it as "no prior state" — the diff will show every head gap
        # as newly-opened, which is accurate for a first-time install.
        if [ ! -f base-report.json ]; then
          echo '{"total_gaps":0,"gaps":[],"frameworks_analyzed":[],"organization":"","coverage_percentage":0.0,"total_controls_required":0,"total_controls_in_inventory":0,"critical_gaps":0,"high_gaps":0,"medium_gaps":0,"low_gaps":0,"informational_gaps":0,"efficiency_opportunities":[],"prioritized_roadmap":[],"evidentia_version":""}' > base-report.json
        fi

    - name: Compute diff
      id: diff
      shell: bash
      env:
        FAIL_ON_REGRESSION: ${{ inputs.fail-on-regression }}
      run: |
        evidentia gap diff \
          --base base-report.json \
          --head head-report.json \
          --format markdown \
          --output diff.md

        # Re-run in JSON mode to harvest counts for action outputs.
        evidentia gap diff \
          --base base-report.json \
          --head head-report.json \
          --format json \
          --output diff.json

        python - <<'PY'
        import json, os
        with open("diff.json") as f:
            diff = json.load(f)
        summary = diff["summary"]
        is_regression = summary["opened"] > 0 or summary["severity_increased"] > 0
        with open(os.environ["GITHUB_OUTPUT"], "a") as f:
            f.write(f"opened={summary['opened']}\n")
            f.write(f"closed={summary['closed']}\n")
            f.write(f"severity_increased={summary['severity_increased']}\n")
            f.write(f"severity_decreased={summary['severity_decreased']}\n")
            f.write(f"unchanged={summary['unchanged']}\n")
            f.write(f"is_regression={'true' if is_regression else 'false'}\n")
        PY

    - name: Post PR comment
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      env:
        COMMENT_TAG: ${{ inputs.comment-tag }}
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const fs = require("fs");
          const body = fs.readFileSync("diff.md", "utf8");
          const tag = `<!-- ${process.env.COMMENT_TAG} -->`;
          const marked = `${tag}\n${body}`;
          const { owner, repo } = context.repo;
          const issue_number = context.issue.number;
          const existing = await github.paginate(
            github.rest.issues.listComments,
            { owner, repo, issue_number, per_page: 100 }
          );
          const prior = existing.find(c => c.body?.includes(tag));
          if (prior) {
            await github.rest.issues.updateComment({ owner, repo, comment_id: prior.id, body: marked });
          } else {
            await github.rest.issues.createComment({ owner, repo, issue_number, body: marked });
          }

    - name: Fail on regression
      if: steps.diff.outputs.is_regression == 'true' && inputs.fail-on-regression == 'true'
      shell: bash
      run: |
        echo "::error::Compliance regression detected: ${{ steps.diff.outputs.opened }} new gaps, ${{ steps.diff.outputs.severity_increased }} severity increases."
        echo "See the PR comment for details."
        exit 1
