name: Compliance Gap Analysis

on:
  pull_request:
    paths:
      - "my-controls.yaml"
      - ".github/workflows/evidentia.yml"

jobs:
  gap-analysis:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # needed so the action can diff against base

      - uses: allenfbyrd/evidentia-action@v1
        with:
          inventory: my-controls.yaml
          frameworks: nist-800-53-rev5-moderate,soc2-tsc
          fail-on-regression: true
