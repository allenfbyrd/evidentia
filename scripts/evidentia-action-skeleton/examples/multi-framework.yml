name: Compliance Gap Analysis (multi-framework)

on:
  pull_request:
    paths:
      - "my-controls.yaml"

jobs:
  gap-analysis:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    strategy:
      fail-fast: false
      matrix:
        framework-set:
          - name: "Federal"
            ids: "nist-800-53-rev5-moderate,fedramp-rev5-moderate"
          - name: "Commercial"
            ids: "soc2-tsc,iso-27001-2022"
          - name: "Healthcare"
            ids: "hipaa-security,hipaa-privacy"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: allenfbyrd/evidentia-action@v1
        with:
          inventory: my-controls.yaml
          frameworks: ${{ matrix.framework-set.ids }}
          comment-tag: "evidentia-${{ matrix.framework-set.name }}"
          fail-on-regression: true
