# =============================================================================
# Meridian Financial v2 — "PR branch" control inventory
# =============================================================================
# Intentionally designed to produce every diff classification when fed
# through `evidentia gap diff --base snapshots/baseline.json
# --head snapshots/pr-branch.json`:
#
#   • AU-6 moves from not_implemented → partially_implemented  (closed: severity down)
#   • SI-4 moves from not_implemented → partially_implemented  (closed: severity down)
#   • AU-2 moves from planned → implemented                    (closed)
#   • AC-17 moves from implemented → partially_implemented     (regression: opened / sev up)
#   • CP-10 moves from partially_implemented → not_implemented (sev up)
#   • SR-3 moves from partially_implemented → implemented      (closed)
#   • NEW control added: AU-12 not_implemented                 (opened as a new gap)
#   • SI-2 moves from partially → implemented                  (closed)
#
# Everything else unchanged — demonstrates that unchanged controls
# correctly stay out of the "change" buckets.
# =============================================================================

organization: "Meridian Financial"
system_name: "Meridian Customer Banking Platform"

